<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Minas Tintas — Admin</title>
<link rel="stylesheet" href="../../colors_and_type.css">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<script src="https://unpkg.com/lucide@0.460.0/dist/umd/lucide.min.js"></script>
<style>
/* ===== RESET ===== */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
button { font-family: inherit; cursor: pointer; border: none; background: none; }

/* override display font to match mobile */
:root { --font-display: "Plus Jakarta Sans", -apple-system, sans-serif; }

/* ===== PAGE ===== */
body {
  background: var(--paper-deep);
  font-family: var(--font-body);
  color: var(--ink);
  min-height: 100vh;
  padding: 32px 40px 40px;
}
.stage { display: flex; flex-direction: column; gap: 0; max-width: 1400px; margin: 0 auto; }

/* ===== BROWSER CHROME ===== */
.browser {
  background: var(--paper);
  border: 1px solid var(--line-strong);
  border-radius: 14px;
  overflow: hidden;
  box-shadow: 0 24px 60px rgba(28,26,23,.12);
}
.chrome-bar {
  height: 38px;
  background: var(--paper-deep);
  border-bottom: 1px solid var(--line);
  display: flex; align-items: center;
  padding: 0 14px; gap: 10px;
}
.chrome-dot { width: 11px; height: 11px; border-radius: 50%; flex-shrink: 0; }
.chrome-url {
  margin-left: 18px; flex: 1; max-width: 480px;
  background: var(--card); border: 1px solid var(--line); border-radius: 8px;
  padding: 5px 12px; font-family: monospace; font-size: 11px; color: var(--muted);
}
.chrome-version { margin-left: auto; font-size: 11px; color: var(--muted); font-family: monospace; flex-shrink: 0; }

/* ===== APP SHELL ===== */
.app-shell { display: grid; grid-template-columns: 232px 1fr; height: 820px; transition: grid-template-columns .22s cubic-bezier(.4,0,.2,1); }

/* ===== SIDEBAR ===== */
.sidebar {
  background: #1C1A17;
  border-right: 1px solid rgba(255,255,255,.08);
  padding: 20px 14px;
  display: flex; flex-direction: column; gap: 18px;
  flex-shrink: 0; overflow: hidden;
  transition: padding .22s cubic-bezier(.4,0,.2,1);
}
.sidebar.collapsed:not(.hovered) { padding: 20px 8px; }
.sidebar-brand { padding: 22px 14px 16px; border-bottom: 1px solid rgba(255,255,255,.08); }
.sidebar-brand img { height: 52px; display: block; }
.sidebar-tag { font-size: 10px; font-weight: 600; color: rgba(255,255,255,.35); letter-spacing: 0.16em; text-transform: uppercase; margin-top: 6px; }
.sidebar-nav { display: flex; flex-direction: column; gap: 2px; }
.nav-item {
  display: flex; align-items: center; gap: 10px;
  padding: 10px 12px; border-radius: 10px; cursor: pointer;
  font-weight: 500; font-size: 13.5px;
  color: rgba(255,255,255,.5); border: 1px solid transparent;
  transition: background .12s;
  user-select: none;
}
.nav-item:hover { background: rgba(255,255,255,.06); }
.nav-item.active {
  background: rgba(255,255,255,.14); color: #fff;
  font-weight: 600;
  border-color: transparent;
  box-shadow: inset 3px 0 0 var(--brand);
}
.nav-item.active svg, .nav-item.active i { color: #fff !important; }
.nav-badge {
  margin-left: auto;
  background: #fff; color: var(--brand);
  font-size: 10px; font-weight: 700;
  padding: 2px 7px; border-radius: 999px;
  flex-shrink: 0;
  line-height: 1.4;
}
.sidebar-user {
  margin-top: auto;
  padding: 10px;
  display: flex; align-items: center; gap: 10px;
  border-top: 1px solid rgba(255,255,255,.08);
}
.user-avatar {
  width: 32px; height: 32px; border-radius: 50%;
  background: rgba(255,255,255,.15); color: #fff;
  display: flex; align-items: center; justify-content: center;
  font-weight: 600; font-size: 13px; flex-shrink: 0;
}
.user-name { font-size: 12.5px; font-weight: 600; color: #fff; }
.user-role { font-size: 11px; color: var(--muted); }

/* ===== SIDEBAR COLLAPSE ===== */
/* .hovered is a JS class — avoids the bug where CSS :hover blocks click-to-collapse */
.app-shell.sidebar-collapsed:not(:has(#sidebar.hovered)) { grid-template-columns: 56px 1fr; }

.brand-row { display: flex; align-items: center; }
.brand-logo { overflow: hidden; transition: max-height .25s ease, opacity .2s ease; max-height: 80px; display: flex; justify-content: center; width: 100%; }
.sidebar.collapsed:not(.hovered) .brand-logo { max-height: 0; opacity: 0; }
.sidebar.collapsed:not(.hovered) .sidebar-tag { opacity: 0; max-width: 0; overflow: hidden; white-space: nowrap; }
.sidebar.collapsed:not(.hovered) .brand-row { justify-content: center; }
.sidebar.collapsed:not(.hovered) .sidebar-brand { border-bottom-color: transparent; padding-bottom: 8px; }

.sidebar-toggle-btn {
  margin-left: auto; flex-shrink: 0;
  width: 28px; height: 28px; border-radius: 7px;
  display: flex; align-items: center; justify-content: center;
  color: rgba(255,255,255,.8);
  background: rgba(255,255,255,.1);
  border: 1px solid rgba(255,255,255,.16);
  transition: background .12s, color .12s, border-color .12s, transform .1s;
  position: relative; z-index: 1;
}
.sidebar-toggle-btn:hover { background: rgba(255,255,255,.2); color: #fff; border-color: rgba(255,255,255,.28); }
.sidebar-toggle-btn:active { transform: scale(.88); }
.sidebar.collapsed:not(.hovered) .sidebar-toggle-btn { margin-left: 0; }

.nav-label {
  overflow: hidden; white-space: nowrap;
  max-width: 160px;
  transition: max-width .2s ease, opacity .15s ease;
}
.sidebar.collapsed:not(.hovered) .nav-label { max-width: 0; opacity: 0; }
.sidebar.collapsed:not(.hovered) .nav-badge { display: none; }
.sidebar.collapsed:not(.hovered) .nav-item { justify-content: center; padding: 10px 0; gap: 0; }
.sidebar.collapsed:not(.hovered) .sidebar-user { justify-content: center; }
.user-info { overflow: hidden; max-width: 160px; white-space: nowrap; transition: max-width .2s ease, opacity .15s ease; }
.sidebar.collapsed:not(.hovered) .user-info { max-width: 0; opacity: 0; }

/* ===== MAIN ===== */
#main { overflow-y: auto; scrollbar-width: thin; scrollbar-color: var(--line-strong) transparent; }

/* ===== PAGE HEADER ===== */
.page-header {
  display: flex; align-items: flex-end; justify-content: space-between;
  padding: 24px 32px 18px;
  border-bottom: 1px solid var(--line);
  gap: 24px; flex-wrap: wrap;
}
.eyebrow { font-size: 11px; font-weight: 600; letter-spacing: 0.16em; text-transform: uppercase; color: var(--muted); margin-bottom: 4px; }
.page-title { font-family: var(--font-display); font-weight: 800; font-size: 28px; letter-spacing: -0.03em; line-height: 1.05; color: var(--ink); }
.page-subtitle { font-size: 13.5px; color: var(--ink-2); margin-top: 6px; display: flex; align-items: center; gap: 8px; }
.page-subtitle strong { color: var(--ink); font-weight: 700; font-size: 14.5px; }
.painter-dot {
  width: 8px; height: 8px; border-radius: 50%;
  background: var(--success); flex-shrink: 0;
  box-shadow: 0 0 0 0 rgba(79,122,74,.5);
  animation: painter-pulse 2s ease-in-out infinite;
}
@keyframes painter-pulse {
  0%   { box-shadow: 0 0 0 0 rgba(79,122,74,.5); }
  60%  { box-shadow: 0 0 0 6px rgba(79,122,74,0); }
  100% { box-shadow: 0 0 0 0 rgba(79,122,74,0); }
}
.page-actions { display: flex; align-items: center; gap: 8px; flex-shrink: 0; }

/* ===== BUTTONS ===== */
.btn {
  display: inline-flex; align-items: center; gap: 7px;
  padding: 9px 14px; border-radius: 10px;
  font-family: var(--font-body); font-weight: 600; font-size: 13px;
  line-height: 1; cursor: pointer; border: 1px solid transparent;
  transition: opacity .12s;
  white-space: nowrap;
}
.btn:hover { opacity: .82; }
.btn svg { width: 14px; height: 14px; stroke-width: 2; flex-shrink: 0; }
.btn-primary { background: var(--brand); color: #fff; }
.btn-dark    { background: var(--ink);   color: var(--paper); }
.btn-ghost   { background: var(--card);  color: var(--ink); border-color: var(--line); }
.btn-quiet   { background: transparent; color: var(--ink-2); }
.btn-danger  { color: var(--brand) !important; }
.btn-sm      { padding: 7px 10px; font-size: 12px; }
.btn-sm svg  { width: 13px; height: 13px; }
.btn-full    { width: 100%; justify-content: center; }

/* ===== SEARCH BOX ===== */
.search-box {
  display: inline-flex; align-items: center; gap: 8px;
  background: var(--card); border: 1px solid var(--line);
  border-radius: 10px; padding: 0 12px; height: 36px;
  font-size: 13px; color: var(--muted); width: 280px;
}
.search-box svg { width: 15px; height: 15px; color: var(--muted); flex-shrink: 0; }

/* ===== STAT GRID ===== */
.stat-grid {
  display: grid; grid-template-columns: repeat(4, 1fr);
  gap: 14px; padding: 20px 32px 16px;
}
.stat-tile {
  background: var(--card); border: 1px solid var(--line);
  border-radius: 14px; padding: 16px 18px;
  display: flex; flex-direction: column; gap: 6px;
  box-shadow: 0 1px 2px rgba(28,26,23,.04);
}
.stat-label { font-size: 11px; font-weight: 600; letter-spacing: 0.16em; text-transform: uppercase; color: var(--muted); }
.stat-value {
  font-family: var(--font-display);
  font-weight: 800; font-size: 30px; color: var(--ink);
  letter-spacing: -0.03em; line-height: 1;
  font-variant-numeric: tabular-nums; margin-top: 2px;
}
.stat-accent .stat-value { color: var(--brand); }
.stat-foot { font-size: 12px; color: var(--muted); margin-top: 2px; }

/* ===== FILTER BAR ===== */
.filter-bar {
  display: flex; align-items: center; gap: 8px;
  padding: 0 32px 8px; flex-wrap: wrap;
}
.filter-pill {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 6px 12px; border-radius: 999px;
  font-size: 12px; font-weight: 600;
  background: var(--card); color: var(--ink-2);
  border: 1px solid var(--line); cursor: pointer;
  transition: background .12s, color .12s;
}
.filter-pill:hover { background: var(--paper-deep); }
.filter-pill.active { background: var(--ink); color: var(--paper); border-color: var(--ink); }
.filter-count { opacity: .6; font-weight: 500; }

/* ===== TABLE ===== */
.table-wrap { padding: 12px 32px 32px; }
.data-table {
  background: var(--card); border: 1px solid var(--line);
  border-radius: 14px; overflow: hidden;
}
.table-head {
  display: grid;
  padding: 12px 18px; gap: 16px;
  background: var(--paper-deep); border-bottom: 1px solid var(--line);
  font-size: 10.5px; font-weight: 600; letter-spacing: 0.16em;
  text-transform: uppercase; color: var(--muted);
}
.table-row {
  display: grid;
  padding: 14px 18px; gap: 16px; align-items: center;
  border-bottom: 1px solid var(--line); cursor: pointer;
  font-size: 13px; color: var(--ink-2);
  transition: background .1s;
}
.table-row:last-child { border-bottom: 0; }
.table-row:hover { background: var(--paper-deep); }

/* Orders table columns */
.orders-table .table-head,
.orders-table .table-row {
  grid-template-columns: 70px 1fr 1fr 90px 130px 185px 100px;
}
/* Painters table columns */
.painters-table .table-head,
.painters-table .table-row {
  grid-template-columns: 1fr 160px 110px 90px 150px 120px;
}

.td-primary   { font-weight: 600; color: var(--ink); }
.td-secondary { font-size: 11.5px; color: var(--muted); margin-top: 2px; }
.td-right     { text-align: right; font-variant-numeric: tabular-nums; }
.td-right strong { color: var(--ink); }

.td-with-avatar { display: flex; align-items: center; gap: 12px; }
.avatar {
  width: 36px; height: 36px; border-radius: 50%; flex-shrink: 0;
  background: var(--paper-deep); color: var(--ink);
  display: flex; align-items: center; justify-content: center;
  font-weight: 600; font-size: 13px; border: 1px solid var(--line);
}

/* ===== STATUS PILL ===== */
.status-pill {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 3px 9px; border-radius: 999px;
  font-size: 11px; font-weight: 600; white-space: nowrap;
}
.status-dot { width: 5px; height: 5px; border-radius: 50%; flex-shrink: 0; }

/* ===== DETAIL LAYOUT ===== */
.detail-grid {
  display: grid; grid-template-columns: 2fr 1fr;
  gap: 18px; padding: 20px 32px 32px;
}
.detail-side { display: flex; flex-direction: column; gap: 14px; }

/* ===== CARDS ===== */
.card {
  background: var(--card); border: 1px solid var(--line);
  border-radius: 16px; padding: 20px 24px;
}
.card-title {
  font-family: var(--font-display);
  font-weight: 700; font-size: 18px; color: var(--ink);
  letter-spacing: -0.02em;
}

/* ===== RECEIPT ===== */
.receipt-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
.receipt-row {
  display: grid; grid-template-columns: 1fr 72px 110px 120px;
  gap: 16px; align-items: center;
  padding: 12px 0;
  border-bottom: 1px dashed var(--line-strong);
  font-size: 13.5px; color: var(--ink-2);
}
.receipt-row.last { border-bottom: 0; }
.receipt-name { color: var(--ink); }
.receipt-qty, .receipt-unit { text-align: right; font-variant-numeric: tabular-nums; }
.receipt-subtotal { text-align: right; font-variant-numeric: tabular-nums; font-weight: 600; color: var(--ink); }
.receipt-total {
  display: flex; justify-content: space-between; align-items: baseline;
  margin-top: 14px; padding-top: 14px;
  border-top: 1px solid var(--line);
}
.receipt-total-label { font-size: 13px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.12em; font-weight: 600; }
.receipt-total-value {
  font-family: var(--font-display);
  font-weight: 800; font-size: 34px; color: var(--ink);
  letter-spacing: -0.03em; font-variant-numeric: tabular-nums;
}
.receipt-payment {
  display: flex; align-items: center; gap: 6px;
  margin-top: 12px; padding-top: 12px;
  border-top: 1px solid var(--line);
  font-size: 12.5px; color: var(--muted);
}
.receipt-payment svg { width: 14px; height: 14px; color: var(--muted); }
.receipt-payment strong { color: var(--ink-2); }

/* ===== BONUS CARD ===== */
.bonus-label { font-size: 11px; font-weight: 600; letter-spacing: 0.16em; text-transform: uppercase; color: var(--muted); }
.bonus-value {
  font-family: var(--font-display);
  font-weight: 800; font-size: 44px; color: var(--brand);
  letter-spacing: -0.03em; line-height: 1;
  font-variant-numeric: tabular-nums; margin-top: 6px;
}
.bonus-value small { font-family: var(--font-body); font-size: 14px; font-weight: 500; color: var(--muted); margin-left: 4px; letter-spacing: 0; }
.bonus-desc { font-size: 12.5px; color: var(--muted); line-height: 1.5; margin-top: 10px; }
.bonus-card .btn { margin-top: 14px; }

/* ===== TIMELINE ===== */
.timeline-label { font-size: 11px; font-weight: 600; letter-spacing: 0.16em; text-transform: uppercase; color: var(--muted); margin-bottom: 10px; }
.timeline-entry { display: grid; grid-template-columns: 22px 1fr; gap: 12px; padding-bottom: 12px; }
.timeline-entry:last-child { padding-bottom: 0; }
.timeline-spine { display: flex; flex-direction: column; align-items: center; padding-top: 4px; }
.timeline-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
.timeline-dot.done { background: #4F7A4A; }
.timeline-dot.pending { background: var(--brand); }
.timeline-line { width: 1px; flex: 1; background: var(--line-strong); margin-top: 2px; }
.timeline-text { font-size: 13px; color: var(--ink); font-weight: 500; }
.timeline-text.bold { font-weight: 600; }
.timeline-time { font-size: 11px; color: var(--muted); margin-top: 2px; }

/* ===== REWARD GRID ===== */
.reward-grid {
  display: grid; grid-template-columns: repeat(4, 1fr);
  gap: 16px; padding: 20px 32px 32px;
}
.reward-card {
  background: var(--card); border: 1px solid var(--line);
  border-radius: 14px; padding: 14px;
  display: flex; flex-direction: column; gap: 8px;
  box-shadow: 0 1px 2px rgba(28,26,23,.04);
}
.reward-thumb {
  aspect-ratio: 1.2; border-radius: 10px;
  background: var(--paper-deep); border: 1px solid var(--line);
  display: flex; align-items: center; justify-content: center;
  color: var(--muted); position: relative; overflow: hidden;
}
.reward-thumb img { width: 100%; height: 100%; object-fit: cover; border-radius: 9px; }
.reward-thumb svg { width: 40px; height: 40px; }
.promo-badge {
  position: absolute; top: 8px; left: 8px;
  background: var(--brand); color: #fff;
  font-size: 9px; font-weight: 700; letter-spacing: 0.1em;
  padding: 3px 7px; border-radius: 4px;
}
.oculto-badge {
  position: absolute; top: 8px; right: 8px;
  background: rgba(28,26,23,.6); color: #fff;
  font-size: 9px; font-weight: 700; letter-spacing: 0.1em;
  padding: 3px 7px; border-radius: 4px; text-transform: uppercase;
}
.reward-card.hidden-reward { opacity: 0.45; transition: opacity .18s; }
.reward-card.hidden-reward .reward-thumb img,
.reward-card.hidden-reward .reward-thumb svg { filter: grayscale(1); }
.reward-name { font-weight: 600; font-size: 13.5px; color: var(--ink); line-height: 1.25; }
.reward-meta { display: flex; justify-content: space-between; align-items: baseline; }
.reward-pts { display: flex; flex-direction: column; gap: 2px; }
.reward-pts-original { font-size: 11px; color: var(--muted); text-decoration: line-through; }
.reward-pts-current {
  font-family: var(--font-display);
  font-weight: 800; font-size: 18px; color: var(--ink);
  letter-spacing: -0.03em; font-variant-numeric: tabular-nums;
  display: inline-flex; align-items: center; gap: 4px;
}
.reward-pts-current .coin { width: 15px; height: 15px; display: inline-block; vertical-align: middle; }
.reward-pts-current small { font-family: var(--font-body, 'Inter', sans-serif); font-size: 11px; font-weight: 500; color: var(--muted); margin-left: 1px; }
.reward-stock { font-size: 11px; color: var(--muted); }
.reward-actions { display: flex; gap: 6px; margin-top: 4px; }
.reward-desc { font-size: 11.5px; color: var(--muted); line-height: 1.4; margin: 3px 0 6px; }
.stepper { display:inline-flex; align-items:center; border:1.5px solid var(--line); border-radius:8px; overflow:hidden; height:38px; }
.stepper-btn { width:38px; height:100%; border:none; background:transparent; cursor:pointer; font-size:18px; font-weight:300; color:var(--ink); display:flex; align-items:center; justify-content:center; transition:background .12s; }
.stepper-btn:hover { background:var(--card); }
.stepper-val { padding:0 16px; font-family:var(--font-display); font-weight:800; font-size:16px; letter-spacing:-.02em; min-width:64px; text-align:center; border-left:1.5px solid var(--line); border-right:1.5px solid var(--line); }
.mult-formula-box { background:var(--card); border:1.5px solid var(--line); border-radius:10px; padding:14px 16px; }
.mult-formula-row { display:flex; align-items:center; gap:10px; font-family:var(--font-display); font-weight:800; font-size:15px; letter-spacing:-.02em; flex-wrap:wrap; }
.mult-formula-op { color:var(--muted); font-family:var(--font-body); font-weight:400; font-size:14px; }
.pts-preview { font-size:13px; color:var(--ink); padding:9px 12px; background:var(--card); border-radius:8px; border:1.5px solid var(--line); min-height:36px; display:flex; align-items:center; gap:6px; }

/* ===== LOJINHA TABS ===== */
.lojinha-tabs {
  display: flex; gap: 0; border-bottom: 1.5px solid var(--line);
  padding: 0 32px; margin-top: -4px;
}
.lojinha-tab {
  padding: 10px 18px 9px; font-size: 13px; font-weight: 600;
  color: var(--muted); cursor: pointer; border: none; background: none;
  border-bottom: 2px solid transparent; margin-bottom: -1.5px;
  transition: color .15s, border-color .15s; display: flex; align-items: center; gap: 7px;
}
.lojinha-tab:hover { color: var(--ink); }
.lojinha-tab.active { color: var(--ink); border-bottom-color: var(--brand); }
.tab-badge {
  background: var(--brand); color: #fff; font-size: 10px; font-weight: 700;
  padding: 1px 6px; border-radius: 20px; line-height: 1.6;
}
/* ===== RESGATES LIST ===== */
.resgates-toolbar {
  display: flex; align-items: center; gap: 8px;
  padding: 18px 32px 0;
}
.resgates-list {
  display: flex; flex-direction: column;
  padding: 0 32px 32px;
}
.resgate-row {
  display: flex; align-items: center; gap: 14px;
  padding: 18px 0;
  border-bottom: 1px solid var(--line);
}
.resgate-row:last-child { border-bottom: none; }
.resgate-thumb {
  width: 52px; height: 52px; flex-shrink: 0;
  border-radius: 8px; background: var(--paper-deep);
  border: 1px solid var(--line); overflow: hidden;
  display: flex; align-items: center; justify-content: center;
  color: var(--muted);
}
.resgate-thumb img { width: 100%; height: 100%; object-fit: cover; }
.resgate-info { flex: 1; min-width: 0; }
.resgate-item-name { font-size: 13.5px; font-weight: 600; color: var(--ink); }
.resgate-pintor { font-size: 12px; color: var(--muted); margin-top: 2px; }
.resgate-meta { text-align: right; flex-shrink: 0; }
.resgate-pts { font-family: var(--font-display); font-weight: 800; font-size: 15px; letter-spacing: -.02em; color: var(--ink); }

function brl(v) { return v.toLocaleString('pt-BR', { minimumFractionDigits: 2 }); }
function pts(v) { return Math.round(v).toLocaleString('pt-BR'); }
function rewardPts(r)     { return Math.round(r.custo * (globalMult + (r.itemMod || 0))); }
function rewardOrigPts(r) { return (r.itemMod || 0) < 0 ? Math.round(r.custo * globalMult) : null; }
function rewardIsPromo(r) { return (r.itemMod || 0) < 0; }
function fmtMod(v)        { if (v === 0) return '0×'; return (v > 0 ? '+' : '') + v.toLocaleString('pt-BR', {maximumFractionDigits:2}) + '×'; }
function calcPreviewHtml(custo, mod) {
  const eff  = globalMult + mod;
  const p    = Math.round(custo * eff);
  const orig = Math.round(custo * globalMult);
  if (mod < 0) return `<span style="text-decoration:line-through;color:var(--muted);font-size:12px">${pts(orig)} pts</span>&nbsp; <strong style="color:var(--brand)">${pts(p)} pts</strong> <span class="promo-badge" style="font-size:10px;padding:2px 6px;vertical-align:middle">PROMO</span>`;
  if (mod > 0) return `<strong>${pts(p)} pts</strong> <span style="font-size:11px;color:var(--muted)">(base: ${pts(orig)} pts)</span>`;
  return `<strong>${pts(p)} pts</strong>`;
}
function bonus(total) { return Math.round(total * 0.10); }
function initials(name) { return name.split(' ').map(s => s[0]).slice(0, 2).join(''); }
function icon(name, size) { return `<i data-lucide="${name}" style="width:${size||16}px;height:${size||16}px"></i>`; }

const MONTH_NUM = {jan:1,fev:2,mar:3,abr:4,mai:5,jun:6,jul:7,ago:8,set:9,out:10,nov:11,dez:12};
const MONTH_ABBR_MAP = {'janeiro':'jan','fevereiro':'fev','março':'mar','marco':'mar','abril':'abr','maio':'mai','junho':'jun','julho':'jul','agosto':'ago','setembro':'set','outubro':'out','novembro':'nov','dezembro':'dez'};

function dateVal(d) {
  const [day, mon] = (d||'').split(' ');
  return (MONTH_NUM[mon] || 0) * 100 + (parseInt(day, 10) || 0);
}

function normalizeSearchDate(q) {
  let s = q.toLowerCase().trim();
  for (const [full, abbr] of Object.entries(MONTH_ABBR_MAP)) s = s.replace(new RegExp(full, 'g'), abbr);
  s = s.replace(/(\d{1,2})\/(\d{2})(?:\/\d{4})?/, (_, day, month) => {
    const mn = parseInt(month, 10);
    const abbr = Object.keys(MONTH_NUM).find(k => MONTH_NUM[k] === mn);
    return abbr ? `${day} ${abbr}` : `${day}/${month}`;
  });
  return s;
}

  const next = (nmCart[id] || 0) + delta;
  if (next <= 0) delete nmCart[id]; else nmCart[id] = next;
  updateNmCartDOM();
}

function updateNmCartDOM() {
  const el   = document.getElementById('nm-cart-items');
  if (!el) return;
  const keys = Object.keys(nmCart).filter(id => nmCart[id] > 0);
  if (!keys.length) {
    el.innerHTML = `<div class="nm-cart-empty">Nenhum produto adicionado ainda.</div>`;
    return;
  }
  const total    = keys.reduce((s, id) => { const p = CATALOG.find(x => x.id === id); return p ? s + p.price * nmCart[id] : s; }, 0);
  const bonusPts = Math.round(total * 0.10);
  el.innerHTML = `
    <div class="nm-cart-list">
      ${keys.map(id => {
        const p = CATALOG.find(x => x.id === id);
        if (!p) return '';
        const qty = nmCart[id];
        return `<div class="nm-cart-item">
          <span style="color:var(--muted);flex-shrink:0">${icon(p.icon, 14)}</span>
          <span class="nm-cart-name">${p.name}</span>
          <div class="nm-cart-ctrl">
            <div class="qty-ctrl-sm">
              <button class="qty-btn-sm" onclick="addNmCart('${id}',-1)">−</button>
              <span class="qty-val-sm">${qty}</span>
              <button class="qty-btn-sm" onclick="addNmCart('${id}',1)">+</button>
            </div>
            <span class="nm-cart-sub">R$ ${(p.price * qty).toLocaleString('pt-BR',{minimumFractionDigits:2})}</span>
          </div>
        </div>`;
      }).join('')}
    </div>
    <div class="nm-cart-total">
      <span style="color:var(--muted)">Total estimado</span>
      <span><strong>R$ ${total.toLocaleString('pt-BR',{minimumFractionDigits:2})}</strong> · <span style="color:var(--success);font-weight:600">${bonusPts.toLocaleString('pt-BR')} pts</span></span>
    </div>`;
  if (window.lucide) lucide.createIcons({ attrs: { 'stroke-width': '1.75' } });
}

function submitNovoManual() {
  const pInput  = document.getElementById('nm-pintor-input');
  const oEl     = document.getElementById('nm-obra');
  const pmBtn   = document.querySelector('#nm-payment-options .payment-option.active');
  let valid     = true;
  const pValid  = !!(nmPintorValue && PAINTERS.find(p => p.name === nmPintorValue));
  if (pInput) pInput.classList.toggle('form-error', !pValid);
  if (!pValid) valid = false;
  if (oEl) {
    const empty = !oEl.value.trim();
    oEl.classList.toggle('form-error', empty);
    if (empty) valid = false;
  }
  const pmContainer = document.getElementById('nm-payment-options');
  if (pmContainer) pmContainer.classList.toggle('form-error', !pmBtn);
  if (!pmBtn) valid = false;
  if (!valid) return;
  const painter  = PAINTERS.find(p => p.name === nmPintorValue);
  const newId    = String(Number(ORDERS[0].id) + 1).padStart(4, '0');
  const cartKeys = Object.keys(nmCart).filter(id => nmCart[id] > 0);
  const total    = cartKeys.reduce((s, id) => {
    const p = CATALOG.find(x => x.id === id);
    return p ? s + p.price * nmCart[id] : s;
  }, 0);
  const items = cartKeys.map(id => {
    const p = CATALOG.find(x => x.id === id);
    return p ? { name: p.name, qty: nmCart[id], unit: p.price } : null;
  }).filter(Boolean);
  ORDERS.unshift({
    id: newId, painter: nmPintorValue,
    location: painter ? painter.city : 'São João del-Rei',
    title: oEl.value.trim(), date: '19 mai',
    total, items, status: 'pendente', payment: pmBtn.dataset.payment,
    notes: (document.getElementById('nm-notes') || {}).value?.trim() || '',
  });
  nmPintorValue  = '';
  nmCart         = {};
  novoManualOpen = false;
  renderMain();
}

          onmouseover="this.style.opacity='.85'" onmouseout="this.style.opacity='1'">

function toggleAdmSenha() {
  const inp = document.getElementById('adm-senha');
  const ic  = document.getElementById('adm-senha-eye');
  if (!inp) return;
  const show = inp.type === 'password';
  inp.type = show ? 'text' : 'password';
  if (ic) ic.setAttribute('data-lucide', show ? 'eye-off' : 'eye');
  if (window.lucide) lucide.createIcons({ attrs: { 'stroke-width': '1.75' } });
}

function renderMain() {
  const main = document.getElementById('main');
  switch (screen) {
    case 'home':       main.innerHTML = renderHome();          break;
    case 'pedidos':    main.innerHTML = renderPedidos();       break;
    case 'pedido':     main.innerHTML = renderPedidoDetail();  break;
    case 'pintores':   main.innerHTML = renderPintores();      break;
    case 'pintor':     main.innerHTML = renderPintorPerfil();  break;
    case 'lojinha':    main.innerHTML = renderLojinha();       break;

function renderHome() {
  return `
    <div style="display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;padding:32px;">
      <div style="width:100%;max-width:560px;">

        <div class="eyebrow" style="text-align:center;margin-bottom:10px;">MINAS TINTAS · CENTRO</div>
        <h1 class="page-title" style="text-align:center;font-size:34px;margin-bottom:8px;">Quem é esse cliente?</h1>
        <p style="text-align:center;color:var(--muted);font-size:14px;margin-bottom:36px;line-height:1.6;">
          Pesquise pelo nome ou telefone para ver se há um pintor vinculado.
        </p>

        <div style="position:relative;">
          <div style="display:flex;align-items:center;gap:10px;background:var(--card);border:1.5px solid var(--line);border-radius:14px;padding:0 18px;height:54px;transition:border-color .15s;"
               onfocuswithin="this.style.borderColor='var(--ink)'" onblur="this.style.borderColor='var(--line)'">
            <span style="color:var(--muted);flex-shrink:0;">${icon('search', 18)}</span>
            <input id="home-search" type="text" placeholder="Nome completo ou telefone…"
              oninput="onHomeSearch(this.value)"
              autocomplete="off"
              style="flex:1;border:none;background:transparent;font-family:var(--font-body);font-size:14.5px;color:var(--ink);outline:none;">
            <button id="home-clear" onclick="clearHomeSearch()"
              style="display:none;background:none;border:none;cursor:pointer;color:var(--muted);padding:4px;border-radius:6px;align-items:center;justify-content:center;">
              ${icon('x', 14)}
            </button>
          </div>

          <div id="home-results" style="margin-top:10px;"></div>
        </div>

      </div>
    </div>
  `;
}

function onHomeSearch(val) {
  homeSearchQuery = val;
  const q = val.toLowerCase().trim();

  const clearBtn = document.getElementById('home-clear');
  if (clearBtn) clearBtn.style.display = q ? 'flex' : 'none';

  const results = document.getElementById('home-results');
  if (!results) return;

  if (!q) { results.innerHTML = ''; return; }

  const digits = q.replace(/\D/g, '');
  const matches = CLIENTS.filter(c =>
    c.name.toLowerCase().includes(q) ||
    (digits.length >= 4 && c.phone && c.phone.replace(/\D/g,'').includes(digits))
  ).slice(0, 8);

  if (!matches.length) {
    results.innerHTML = `
      <div style="text-align:center;padding:36px 0;color:var(--muted);font-size:13.5px;">
        Nenhum cliente encontrado.
      </div>`;
    return;
  }

  results.innerHTML = `
    <div style="background:var(--card);border:1px solid var(--line);border-radius:14px;overflow:hidden;">
      ${matches.map((c, i) => {
        const painter = c.painter ? PAINTERS.find(p => p.name === c.painter) : null;
        const typeIcon = c.type === 'empresa' ? 'building-2' : 'user';
        const isLast   = i === matches.length - 1;
        return `
          <div style="display:flex;align-items:center;gap:14px;padding:16px 20px;${isLast ? '' : 'border-bottom:1px solid var(--line);'}">
            <div style="width:40px;height:40px;border-radius:50%;background:var(--paper-deep);border:1px solid var(--line);
                        display:flex;align-items:center;justify-content:center;color:var(--muted);flex-shrink:0;">
              ${icon(typeIcon, 17)}
            </div>
            <div style="flex:1;min-width:0;">
              <div style="font-size:13.5px;font-weight:600;color:var(--ink);">${c.name}</div>
              <div style="font-size:12px;color:var(--muted);margin-top:2px;">
                ${c.type === 'empresa' ? 'Empresa' : 'Pessoa física'}${c.phone ? ' · ' + c.phone : ''}
              </div>
            </div>
            <div style="text-align:right;flex-shrink:0;">
              ${painter
                ? `<div style="display:inline-flex;align-items:center;gap:6px;background:rgba(79,122,74,.1);
                              color:#4F7A4A;border-radius:999px;padding:4px 10px;font-size:12px;font-weight:600;">
                    ${icon('hard-hat', 13)}&nbsp;${painter.name}
                  </div>
                  <div style="font-size:11px;color:var(--muted);margin-top:4px;">
                    ${painter.city}
                    <span style="cursor:pointer;color:var(--brand);font-weight:600;margin-left:6px;"
                          onclick="goTo('pintores')">Ver perfil →</span>
                  </div>`
                : `<span style="font-size:12px;color:var(--muted);font-style:italic;">Sem pintor vinculado</span>`
              }
            </div>
          </div>`;
      }).join('')}
    </div>`;

  if (window.lucide) lucide.createIcons({ attrs: { 'stroke-width': '1.75' } });
}

function clearHomeSearch() {
  homeSearchQuery = '';
  const inp = document.getElementById('home-search');
  if (inp) { inp.value = ''; inp.focus(); }
  const clearBtn = document.getElementById('home-clear');
  if (clearBtn) clearBtn.style.display = 'none';
  const results = document.getElementById('home-results');
  if (results) results.innerHTML = '';
}

function renderPedidos() {
  const approvedOrders = ORDERS.filter(o => o.status === 'aprovado');
  const approvedTotal  = approvedOrders.reduce((acc, o) => acc + o.total, 0);
  const pendingOrders  = ORDERS.filter(o => o.status === 'pendente');
  const todayOrders    = ORDERS.filter(o => o.date === '19 mai' && o.status === 'aprovado');
  const todayTotal     = todayOrders.reduce((acc, o) => acc + o.total, 0);
  const todayAllOrders = ORDERS.filter(o => o.date === '19 mai');
  const todayAllTotal  = todayAllOrders.reduce((acc, o) => acc + o.total, 0);
  const bonusTotal     = approvedOrders.reduce((acc, o) => acc + bonus(o.total), 0);

  const FILTERS = [
    { key:'todos',     label:'Todos',    count: ORDERS.length,                                      dot: null      },
    { key:'pendente',  label:'Pendente', count: ORDERS.filter(o=>o.status==='pendente').length,      dot: '#B5751F' },
    { key:'aprovado',  label:'Aprovado', count: approvedOrders.length,                              dot: '#4F7A4A' },
    { key:'recusado',  label:'Recusado', count: ORDERS.filter(o=>o.status==='recusado').length,      dot: '#CC0000' },
    { key:'estornado', label:'Estornado',count: ORDERS.filter(o=>o.status==='estornado').length,     dot: '#8A817A' },
  ];

  let filtered = filter === 'todos' ? [...ORDERS] : ORDERS.filter(o => o.status === filter);
  if (advFilters.pintor)  filtered = filtered.filter(o => o.painter  === advFilters.pintor);
  if (advFilters.payment) filtered = filtered.filter(o => o.payment  === advFilters.payment);
  if (dateSortOrder === 'asc')  filtered.sort((a, b) => dateVal(a.date) - dateVal(b.date));
  if (dateSortOrder === 'desc') filtered.sort((a, b) => dateVal(b.date) - dateVal(a.date));
  const hasAdv = !!(advFilters.pintor || advFilters.payment);

  return `
    <div class="page-header">
      <div>
        <div class="eyebrow">LOJA · CENTRO · SÃO JOÃO DEL-REI</div>
        <h1 class="page-title">Pedidos para aprovação</h1>
        <p class="page-subtitle">Confirme pagamentos e libere bônus.</p>
      </div>
      <div class="page-actions">
        <div class="search-box">
          ${icon('search', 15)}
          <input class="search-input" type="text" placeholder="Buscar por pintor, obra, número ou data…"
            oninput="onSearch(this.value)"
            style="border:none;outline:none;background:transparent;font-family:var(--font-body);font-size:13px;color:var(--ink);width:100%">
        </div>

        <div style="position:relative">
          <button class="btn btn-ghost filters-btn" onclick="toggleFiltersPanel(event)">
            ${icon('sliders-horizontal')} Filtros
            ${hasAdv ? '<span class="filters-active-dot"></span>' : ''}
          </button>
          ${filtersOpen ? `
            <div class="filters-panel" onclick="event.stopPropagation()">
              <div class="fp-row">
                <label class="fp-label">Pintor</label>
                <select id="adv-pintor" class="fp-select">
                  <option value="">Todos os pintores</option>
                  ${[...new Set(ORDERS.map(o => o.painter))].sort().map(p =>
                    `<option value="${p}"${advFilters.pintor === p ? ' selected' : ''}>${p}</option>`
                  ).join('')}
                </select>
              </div>
              <div class="fp-row">
                <label class="fp-label">Forma de pagamento</label>
                <select id="adv-payment" class="fp-select">
                  <option value="">Todas</option>
                  ${['Cartão', 'Dinheiro', 'Notinha', 'Pix'].map(p =>
                    `<option value="${p}"${advFilters.payment === p ? ' selected' : ''}>${p}</option>`
                  ).join('')}
                </select>
              </div>
              <div class="fp-actions">
                <button class="btn btn-ghost btn-sm" onclick="clearAdvFilters()">Limpar</button>
                <button class="btn btn-dark btn-sm" onclick="applyAdvFilters()">${icon('check', 13)} Aplicar</button>
              </div>
            </div>
          ` : ''}
        </div>
        <button class="btn btn-dark" onclick="openNovoManual()">${icon('plus')} Novo manual</button>
      </div>
    </div>

    <div class="stat-grid">
      <div class="stat-tile t-warn">
        <div class="stat-label">PENDENTES</div>
        <div class="stat-value">${pendingOrders.length}</div>
        <div class="stat-foot">aguardando pagamento</div>
      </div>
      <div class="stat-tile t-success">
        <div class="stat-label">HOJE · 19 MAI</div>
        <div class="stat-value">R$ ${todayTotal.toLocaleString('pt-BR', {minimumFractionDigits:0, maximumFractionDigits:0})}</div>
        <div class="stat-foot">${todayOrders.length} pedido${todayOrders.length !== 1 ? 's' : ''} aprovado${todayOrders.length !== 1 ? 's' : ''}</div>
      </div>
      <div class="stat-tile t-purple">
        <div class="stat-label">BÔNUS LIBERADO · TOTAL</div>

      </div>
      <div class="stat-tile">
        <div class="stat-label">HOJE · VOLUME</div>
        <div class="stat-value">R$ ${todayAllTotal.toLocaleString('pt-BR', {minimumFractionDigits:0, maximumFractionDigits:0})}</div>
        <div class="stat-foot">${todayAllOrders.length} pedido${todayAllOrders.length !== 1 ? 's' : ''} no dia</div>
      </div>
    </div>

    <div class="filter-bar">
      ${FILTERS.map(t => `
        <button class="filter-pill${filter === t.key ? ' active' : ''}" onclick="setFilter('${t.key}')">
          ${t.dot ? `<span style="width:6px;height:6px;border-radius:50%;background:${t.dot};flex-shrink:0;display:inline-block"></span>` : ''}

    <div class="table-wrap">

          <div>Status</div>
          <div></div>
        </div>
        ${filtered.length === 0 ? `<div style="padding:32px;text-align:center;color:var(--muted);font-size:13px">Nenhum pedido neste filtro.</div>` :
          filtered.map(o => `
            <div class="table-row" onclick="goTo('pedido','${o.id}')">
              <div style="font-variant-numeric:tabular-nums;color:var(--muted)">${o.id}</div>
              <div>
                <div class="td-primary">${o.painter}</div>
                <div class="td-secondary">${o.location}</div>

              <div style="color:var(--muted);font-size:12.5px">${o.date}</div>
              <div class="td-right"><strong>R$ ${brl(o.total)}</strong></div>
              <div>${statusPill(o.status)}</div>
              <div style="text-align:right">
                <button class="btn btn-ghost btn-sm">Abrir ${icon('chevron-right', 13)}</button>
              </div>
            </div>
          `).join('')
        }
      </div>
    </div>

    ${novoManualOpen ? `
      <div class="modal-overlay" onclick="closeNovoManual()">
        <div class="modal-panel" onclick="event.stopPropagation()">
          <div class="modal-head">
            <span class="modal-title">Novo pedido manual</span>
            <button class="btn btn-quiet btn-sm" onclick="closeNovoManual()">${icon('x', 15)}</button>
          </div>
          <div class="modal-body">
            <div class="form-row">
              <label class="form-label">Pintor</label>
              <div class="autocomplete-wrap">
                <input id="nm-pintor-input" type="text" class="form-input"

                  oninput="onNmPintorInput(this.value)"
                  onblur="setTimeout(()=>{ const l=document.getElementById('nm-pintor-list'); if(l) l.style.display='none'; },150)"
                  autocomplete="off">
                <div id="nm-pintor-list" class="autocomplete-list" style="display:none"></div>
              </div>
            </div>
            <div class="form-row">
              <label class="form-label">Obra / cliente</label>
              <div class="autocomplete-wrap">
                <input id="nm-obra" type="text" class="form-input" placeholder=""
                  oninput="onNmObraInput(this.value)"
                  onblur="setTimeout(()=>{ const l=document.getElementById('nm-obra-list'); if(l) l.style.display='none'; },150)"
                  autocomplete="off">
                <div id="nm-obra-list" class="autocomplete-list" style="display:none"></div>
              </div>
            </div>
            <div class="form-row">
              <label class="form-label">Produtos</label>
              <div class="autocomplete-wrap">
                <input id="nm-product-search" type="text" class="form-input"
                  placeholder="Buscar produto, marca ou código…"
                  oninput="onNmProductSearch(this.value)"
                  onblur="setTimeout(()=>{ const l=document.getElementById('nm-product-list'); if(l) l.style.display='none'; },150)"
                  autocomplete="off">
                <div id="nm-product-list" class="autocomplete-list" style="display:none"></div>
              </div>
              <div id="nm-cart-items"><div class="nm-cart-empty">Nenhum produto adicionado ainda.</div></div>
            </div>
            <div class="form-row">
              <label class="form-label">Pagamento informado</label>
              <div class="payment-options" id="nm-payment-options">
                <button class="payment-option" type="button" data-payment="Dinheiro" onclick="selectNmPayment(this)">
                  ${icon('banknote', 15)} Dinheiro
                </button>
                <button class="payment-option" type="button" data-payment="Pix" onclick="selectNmPayment(this)">
                  ${icon('qr-code', 15)} Pix
                </button>
                <button class="payment-option" type="button" data-payment="Cartão" onclick="selectNmPayment(this)">
                  ${icon('credit-card', 15)} Cartão
                </button>
                <button class="payment-option" type="button" data-payment="Notinha" onclick="selectNmPayment(this)">
                  ${icon('receipt', 15)} Notinha
                </button>
              </div>
            </div>
            <div class="form-row">
              <label class="form-label">Anotação interna</label>
              <textarea id="nm-notes" class="form-input" rows="3"

                style="resize:vertical;min-height:72px;line-height:1.5;"></textarea>

          </div>
        </div>
      </div>
    ` : ''}
  `;
}

    { name:'Tinta látex acrílica fosca 18L — Branco Neve · Suvinil', qty:4, unit:320.00 },
    { name:'Massa corrida 25kg · Suvinil',                            qty:3, unit:84.90  },

  return `
    <div class="page-header">
      <div>
        <button class="back-btn" onclick="goTo('pedidos')">${icon('arrow-left', 14)} Pedidos</button>
        <div class="eyebrow">PEDIDO #${o.id} · ${o.date}</div>
        <h1 class="page-title">${o.title}</h1>
        <p class="page-subtitle"><span class="painter-dot"></span><span style="color:var(--muted);font-size:12px;font-weight:600;text-transform:uppercase;letter-spacing:.1em;">Pintor vinculado</span> &nbsp;<strong>${o.painter}</strong> <span style="color:var(--muted);font-weight:400">· ${o.location}</span></p>
      </div>
      <div class="page-actions">
        <button class="btn btn-ghost" onclick="window.print()">${icon('printer')} Imprimir</button>
        ${o.status === 'pendente' ? `
          <button class="btn btn-ghost btn-danger">${icon('x')} Recusar</button>
          <button class="btn btn-primary">${icon('check')} Aprovar pedido</button>
        ` : `
          <button class="btn btn-ghost btn-danger" onclick="openEstorno()">${icon('rotate-ccw')} Estornar</button>
        `}
      </div>
    </div>

    ${estornoOpen ? `
      <div class="modal-overlay" onclick="closeEstorno()">
        <div class="modal-panel" style="max-width:420px;" onclick="event.stopPropagation()">
          <div class="modal-head">
            <span class="modal-title">Confirmar estorno</span>
            <button class="btn btn-quiet btn-sm" onclick="closeEstorno()">${icon('x', 15)}</button>
          </div>
          <div class="modal-body" style="gap:12px;">
            <p style="font-size:13.5px;color:var(--muted);line-height:1.55;margin:0;">
              O estorno cancela o pedido e reverte o bônus creditado ao pintor. Essa ação não pode ser desfeita.
            </p>
            <div class="form-row">
              <label class="form-label">Motivo do estorno <span style="color:var(--brand)">*</span></label>

                oninput="this.classList.remove('form-error')"></textarea>

          <div class="modal-foot">
            <button class="btn btn-ghost" onclick="closeEstorno()">Cancelar</button>
            <button class="btn btn-primary" style="background:var(--brand);border-color:var(--brand);" onclick="confirmEstorno()">
              ${icon('rotate-ccw', 15)} Confirmar estorno
            </button>
          </div>
        </div>
      </div>
    ` : ''}

    <div class="detail-grid">

      <!-- Receipt -->
      <div class="card">
        <div class="receipt-header">
          <h2 class="card-title">Itens do orçamento</h2>
          ${statusPill(o.status)}
        </div>
        ${items.map((it, i) => `
          <div class="receipt-row${i === items.length-1 ? ' last' : ''}">
            <div class="receipt-name">${it.name}</div>
            <div class="receipt-qty">${it.qty} un.</div>
            <div class="receipt-unit">R$ ${brl(it.unit)}</div>
            <div class="receipt-subtotal">R$ ${brl(it.qty * it.unit)}</div>
          </div>
        `).join('')}
        <div class="receipt-total">
          <span class="receipt-total-label">TOTAL</span>
          <span class="receipt-total-value">R$ ${brl(o.total)}</span>
        </div>
        ${o.payment ? `
          <div class="receipt-payment">
            ${icon('credit-card', 14)}
            Pagamento informado: <strong>${o.payment}</strong>
          </div>` : ''}
        ${o.notes ? `
          <div class="receipt-payment" style="margin-top:8px;padding-top:8px;border-top:1px solid var(--line);align-items:flex-start;gap:7px;">
            ${icon('notebook-pen', 14)}
            <span><span style="font-weight:600;color:var(--ink-2);">Anotação interna</span><br><span style="line-height:1.55;">${o.notes}</span></span>
          </div>` : ''}
        ${o.estornoMotivo ? `
          <div class="receipt-payment" style="margin-top:8px;padding-top:8px;border-top:1px solid var(--line);align-items:flex-start;gap:7px;color:var(--brand);">
            ${icon('rotate-ccw', 14)}
            <span><span style="font-weight:600;">Motivo do estorno</span><br><span style="line-height:1.55;color:var(--muted);">${o.estornoMotivo}</span></span>
          </div>` : ''}
      </div>

      <!-- Side: bonus + timeline -->
      <div class="detail-side">
        <div class="card">
          ${o.status === 'pendente' ? `
            <div class="bonus-label">BÔNUS A CREDITAR</div>
            <div class="bonus-value" style="color:var(--muted)">${pts(bonusPts)}<small>pts</small></div>
            <div style="display:flex;align-items:center;gap:6px;font-size:12px;color:var(--muted);margin-top:6px;flex-wrap:wrap;">
              <span>R$ ${brl(o.total)}</span>
              <span>×</span>
              <span>1%</span>
              <span>=</span>
              <span style="font-weight:600;color:var(--ink)">${bonusPts.toLocaleString('pt-BR')} pts</span>
            </div>
            <div class="bonus-desc" style="margin-top:6px;">Creditado ao pintor na aprovação.</div>
          ` : `
            <div class="bonus-label">BÔNUS CREDITADO ✓</div>
            <div class="bonus-value" style="color:#4F7A4A">${pts(bonusPts)}<small>pts</small></div>
            <div style="display:flex;align-items:center;gap:6px;font-size:12px;color:var(--muted);margin-top:6px;flex-wrap:wrap;">
              <span>R$ ${brl(o.total)}</span>
              <span>×</span>
              <span>1%</span>
              <span>=</span>
              <span style="font-weight:600;color:#4F7A4A">${bonusPts.toLocaleString('pt-BR')} pts</span>
            </div>
          `}
        </div>

        <div class="card">
          <div class="timeline-label">LINHA DO TEMPO</div>
          ${(o.status === 'pendente' ? [
            { t:'12 mar · 14:32', l:'Orçamento criado pelo pintor', done:true  },
            { t:'12 mar · 16:08', l:'Orçamento em análise',         done:true  },
            { t:'agora',          l:'Aguardando aprovação',          done:false },
          ] : [
            { t:'12 mar · 14:32',    l:'Orçamento criado pelo pintor',     done:true },
            { t:'12 mar · 16:08',    l:'Orçamento em análise',             done:true },
            { t:`${o.date} · 18:45`, l:'Pedido aprovado · bônus creditado', done:true },
          ]).map((s, i, arr) => `
            <div class="timeline-entry">
              <div class="timeline-spine">
                <span class="timeline-dot ${s.done ? 'done' : 'pending'}"></span>
                ${i !== arr.length-1 ? '<span class="timeline-line"></span>' : ''}
              </div>
              <div>
                <div class="timeline-text${!s.done ? ' bold' : ''}">${s.l}</div>
                <div class="timeline-time">${s.t}</div>
              </div>
            </div>
          `).join('')}
        </div>
      </div>

    </div>
  `;
}

/* ============================================================
   SCREEN: PINTORES
   ============================================================ */
function renderPintores() {
  const q = pintoresSearch.toLowerCase().trim();
  const filtered = q
    ? PAINTERS.filter(p =>
        p.name.toLowerCase().includes(q) ||
        p.cpf.includes(q) ||
        p.city.toLowerCase().includes(q))
    : PAINTERS;

  return `
    <div class="page-header">
      <div>
        <div class="eyebrow">CADASTRO</div>
        <h1 class="page-title">Pintores parceiros</h1>
        <p class="page-subtitle">${PAINTERS.filter(p=>p.active).length} pintores ativos · 18 cadastros no último mês.</p>
      </div>
      <div class="page-actions">
        <div class="search-box">
          ${icon('search', 15)}
          <input id="pintores-search" type="text"
            placeholder="Buscar por nome, CPF, cidade…"
            value="${pintoresSearch}"
            oninput="onPintoresSearch(this.value)"
            style="border:none;outline:none;background:transparent;font-family:var(--font-body);font-size:13px;color:var(--ink);width:100%">
        </div>
        <button class="btn btn-ghost">${icon('download')} Exportar</button>
        <button class="btn btn-primary" onclick="openCadastrarPintor()">${icon('user-plus')} Cadastrar pintor</button>
      </div>
    </div>

    <div class="table-wrap">
      <div class="data-table painters-table">
        <div class="table-head">
          <div>Pintor</div>
          <div>Cidade</div>
          <div>Desde</div>
          <div style="text-align:right">Pedidos</div>
          <div style="text-align:right">Saldo</div>
          <div>Status</div>
        </div>
        ${filtered.length === 0
          ? `<div style="padding:32px;text-align:center;color:var(--muted);font-size:13px">Nenhum pintor encontrado.</div>`
          : filtered.map(p => `
            <div class="table-row" onclick="openPintor('${p.name}')">
              <div class="td-with-avatar">
                <div class="avatar">${initials(p.name)}</div>
                <div>
                  <div class="td-primary">${p.name}</div>
                  <div class="td-secondary">${p.cpf}</div>
                </div>
              </div>
              <div style="color:var(--ink-2);font-size:13px">${p.city}</div>
              <div style="color:var(--muted);font-size:12.5px">${p.since}</div>
              <div class="td-right"><strong>${p.orders}</strong></div>
              <div class="td-right"><strong>${pts(p.points)} pts</strong></div>
              <div>
                <span class="status-pill" style="background:${p.active ? '#E8EFE3' : 'var(--paper-deep)'};color:${p.active ? '#4F7A4A' : 'var(--muted)'}">
                  <span class="status-dot" style="background:${p.active ? '#4F7A4A' : 'var(--muted)'}"></span>
                  ${p.active ? 'ativo' : 'inativo'}
                </span>
              </div>
            </div>
          `).join('')

      </div>
    </div>

    ${cadastrarPintorOpen ? `
      <div class="modal-overlay" onclick="closeCadastrarPintor()">
        <div class="modal-panel" style="max-width:480px;" onclick="event.stopPropagation()">
          <div class="modal-head">
            <span class="modal-title">Cadastrar pintor</span>
            <button class="btn btn-quiet btn-sm" onclick="closeCadastrarPintor()">${icon('x', 15)}</button>
          </div>
          <div class="modal-body" style="gap:14px;max-height:60vh;overflow-y:auto;">
            <div style="display:grid;grid-template-columns:1fr 1fr;gap:14px;">
              <div class="form-row" style="grid-column:1/-1">
                <label class="form-label">Nome completo <span style="color:var(--brand)">*</span></label>
                <input id="cp-nome" type="text" class="form-input" placeholder="Ex.: João da Silva"
                  oninput="this.classList.remove('form-error')" autocomplete="off">
              </div>
              <div class="form-row">
                <label class="form-label">CPF <span style="color:var(--brand)">*</span></label>
                <input id="cp-cpf" type="text" class="form-input" placeholder="000.000.000-00"
                  oninput="this.classList.remove('form-error')" autocomplete="off">
              </div>
              <div class="form-row">
                <label class="form-label">Telefone</label>
                <input id="cp-telefone" type="text" class="form-input" placeholder="(32) 99999-9999" autocomplete="off">
              </div>
              <div class="form-row">
                <label class="form-label">CEP</label>
                <input id="cp-cep" type="text" class="form-input" placeholder="00000-000" autocomplete="off">
              </div>
              <div class="form-row">
                <label class="form-label">Cidade <span style="color:var(--brand)">*</span></label>
                <input id="cp-cidade" type="text" class="form-input" placeholder="Ex.: São João del-Rei"
                  oninput="this.classList.remove('form-error')" autocomplete="off">
              </div>
              <div class="form-row" style="grid-column:1/-1">
                <label class="form-label">Endereço</label>
                <input id="cp-endereco" type="text" class="form-input" placeholder="Ex.: Rua das Flores, Av. Brasil…" autocomplete="off">

                <label class="form-label">Número</label>
                <input id="cp-numero" type="text" class="form-input" placeholder="Ex.: 142" autocomplete="off">

              <div class="form-row">
                <label class="form-label">Complemento</label>

                <label class="form-label">Bairro</label>
                <input id="cp-bairro" type="text" class="form-input" placeholder="Ex.: Centro" autocomplete="off">

            </div>
          </div>
          <div class="modal-foot">
            <button class="btn btn-ghost" onclick="closeCadastrarPintor()">Cancelar</button>
            <button class="btn btn-primary" onclick="submitCadastrarPintor()">${icon('user-plus', 15)} Cadastrar</button>
          </div>
        </div>
      </div>
    ` : ''}
  `;
}

/* ============================================================
   PINTORES — ACTIONS & DETAIL
   ============================================================ */
function openPintor(name) {
  painterId = name;
  screen    = 'pintor';
  renderSidebar();
  renderMain();
}

function onPintoresSearch(q) {
  pintoresSearch = q.toLowerCase().trim();
  renderMain();
}

function openCadastrarPintor() {
  cadastrarPintorOpen = true;
  renderMain();
}

function closeCadastrarPintor() {
  cadastrarPintorOpen = false;
  renderMain();
}

function submitCadastrarPintor() {
  const nomeEl   = document.getElementById('cp-nome');
  const cpfEl    = document.getElementById('cp-cpf');
  const cidadeEl = document.getElementById('cp-cidade');
  const nome   = nomeEl?.value?.trim()   || '';
  const cpf    = cpfEl?.value?.trim()    || '';
  const cidade = cidadeEl?.value?.trim() || '';
  let valid = true;
  if (!nome)   { nomeEl?.classList.add('form-error');   valid = false; }
  if (!cpf)    { cpfEl?.classList.add('form-error');    valid = false; }
  if (!cidade) { cidadeEl?.classList.add('form-error'); valid = false; }
  if (!valid) return;
  const tel         = document.getElementById('cp-telefone')?.value?.trim()    || '';
  const cep         = document.getElementById('cp-cep')?.value?.trim()         || '';
  const endereco    = document.getElementById('cp-endereco')?.value?.trim()    || '';
  const numero      = document.getElementById('cp-numero')?.value?.trim()      || '';
  const complemento = document.getElementById('cp-complemento')?.value?.trim() || '';
  const bairro      = document.getElementById('cp-bairro')?.value?.trim()      || '';
  PAINTERS.unshift({
    name: nome, cpf, city: cidade,
    since: 'mai 2025', orders: 0, points: 0, active: true,
    phone: tel, cep, endereco, numero, complemento, bairro,
  });
  cadastrarPintorOpen = false;
  renderMain();
}

function openEditarPintor(name) {
  painterId        = name;
  editarPintorOpen = true;
  renderMain();
}

function closeEditarPintor() {
  editarPintorOpen = false;
  renderMain();
}

function submitEditarPintor(originalName) {
  const nomeEl   = document.getElementById('ep-nome');
  const cpfEl    = document.getElementById('ep-cpf');
  const cidadeEl = document.getElementById('ep-cidade');
  const nome   = nomeEl?.value?.trim()   || '';
  const cpf    = cpfEl?.value?.trim()    || '';
  const cidade = cidadeEl?.value?.trim() || '';
  let valid = true;
  if (!nome)   { nomeEl?.classList.add('form-error');   valid = false; }
  if (!cpf)    { cpfEl?.classList.add('form-error');    valid = false; }
  if (!cidade) { cidadeEl?.classList.add('form-error'); valid = false; }
  if (!valid) return;
  const p = PAINTERS.find(x => x.name === originalName);
  if (!p) return;
  p.name        = nome;
  p.cpf         = cpf;
  p.city        = cidade;
  p.phone       = document.getElementById('ep-telefone')?.value?.trim()    || p.phone       || '';
  p.cep         = document.getElementById('ep-cep')?.value?.trim()         || p.cep         || '';
  p.endereco    = document.getElementById('ep-endereco')?.value?.trim()    || p.endereco    || '';
  p.numero      = document.getElementById('ep-numero')?.value?.trim()      || p.numero      || '';
  p.complemento = document.getElementById('ep-complemento')?.value?.trim() || p.complemento || '';
  p.bairro      = document.getElementById('ep-bairro')?.value?.trim()      || p.bairro      || '';
  painterId        = nome;
  editarPintorOpen = false;
  renderMain();
}

function togglePainterStatus(name) {
  const p = PAINTERS.find(x => x.name === name);
  if (p) { p.active = !p.active; renderMain(); }
}

  const painterOrders  = ORDERS.filter(o => o.painter === p.name);

          <div>

              <span style="color:var(--line-strong)">·</span>

      <div class="stat-tile t-success">
        <div class="stat-label">SALDO EM PONTOS</div>

        ${painterOrders.length === 0

          : painterOrders.map(o => `
            <div class="table-row" onclick="goTo('pedido','${o.id}')">

              </div>
              <div style="color:var(--ink-2)">${o.title}</div>
              <div style="color:var(--muted);font-size:12.5px">${o.date}</div>
              <div class="td-right"><strong>R$ ${brl(o.total)}</strong></div>
              <div>${statusPill(o.status)}</div>
              <div style="text-align:right">
                <button class="btn btn-ghost btn-sm" onclick="event.stopPropagation();goTo('pedido','${o.id}')">
                  Ver ${icon('chevron-right', 13)}
                </button>
              </div>
            </div>
          `).join('')
        }
      </div>
    </div>

    ${editarPintorOpen ? `
      <div class="modal-overlay" onclick="closeEditarPintor()">
        <div class="modal-panel" style="max-width:480px;" onclick="event.stopPropagation()">
          <div class="modal-head">
            <span class="modal-title">Editar cadastro</span>
            <button class="btn btn-quiet btn-sm" onclick="closeEditarPintor()">${icon('x', 15)}</button>
          </div>
          <div class="modal-body" style="gap:14px;max-height:60vh;overflow-y:auto;">
            <div style="display:grid;grid-template-columns:1fr 1fr;gap:14px;">
              <div class="form-row" style="grid-column:1/-1">
                <label class="form-label">Nome completo <span style="color:var(--brand)">*</span></label>
                <input id="ep-nome" type="text" class="form-input" value="${p.name}"
                  oninput="this.classList.remove('form-error')" autocomplete="off">
              </div>
              <div class="form-row">
                <label class="form-label">CPF <span style="color:var(--brand)">*</span></label>
                <input id="ep-cpf" type="text" class="form-input" value="${p.cpf || ''}"
                  oninput="this.classList.remove('form-error')" autocomplete="off">
              </div>
              <div class="form-row">
                <label class="form-label">Telefone</label>
                <input id="ep-telefone" type="text" class="form-input" value="${p.phone || ''}" autocomplete="off">
              </div>
              <div class="form-row">

                <input id="ep-cidade" type="text" class="form-input" value="${p.city || ''}"

                <input id="ep-endereco" type="text" class="form-input" value="${p.endereco || ''}" placeholder="Ex.: Rua das Flores, Av. Brasil…" autocomplete="off">
              </div>
              <div class="form-row" style="grid-column:1/2;max-width:140px;">
                <label class="form-label">Número</label>
                <input id="ep-numero" type="text" class="form-input" value="${p.numero || ''}" placeholder="Ex.: 142" autocomplete="off">
              </div>

/* ============================================================
   LOJINHA — MULTIPLICADORES
   ============================================================ */
function openMult() {
  multDraft = globalMult;
  multOpen  = true;
  renderMain();
}
function closeMult() { multOpen = false; renderMain(); }
function stepMult(delta) {
  multDraft = Math.round((multDraft + delta) * 100) / 100;
  if (multDraft < 0.25) multDraft = 0.25;
  const d = document.getElementById('mult-val-display');
  const m = document.getElementById('mult-formula-mult');
  const ex = document.getElementById('mult-formula-ex');
  const res = document.getElementById('mult-formula-res');
  if (d)   d.textContent   = multDraft + '×';
  if (m)   m.textContent   = multDraft;
  if (ex)  ex.textContent  = multDraft;
  if (res) res.textContent = pts(300 * multDraft);
}
function saveMult() {
  globalMult = multDraft;
  multOpen   = false;
  renderMain();
}

/* ============================================================
   LOJINHA — EDITAR ITEM
   ============================================================ */
function toggleRewardVisibility(id) {
  if (hiddenRewards.has(id)) hiddenRewards.delete(id);
  else hiddenRewards.add(id);
  goTo('lojinha');
}

function openEditReward(id) {
  const r = REWARDS.find(x => x.id === id);
  if (!r) return;
  editRewardId       = id;
  editRewardMod      = r.itemMod || 0;
  editRewardPhoto    = r.img || null;
  editRewardPhotoPos = r.imgPos ? { ...r.imgPos } : { x: 50, y: 50 };
  renderMain();
}
function closeEditReward() { editRewardId = null; renderMain(); }
function setLojinhaTab(tab) { lojinhaTab = tab; renderMain(); }
function setResgatesFiltro(f) { resgatesFiltro = f; renderMain(); }
function confirmarEntrega(id) {
  const re = RESGATES.find(x => x.id === id);
  if (re) { re.status = 'entregue'; renderMain(); }
}
function recusarResgate(id) {
  const re = RESGATES.find(x => x.id === id);
  if (re) { re.status = 'recusado'; renderMain(); }
}
function stepEditMod(delta) {
  editRewardMod = Math.round((editRewardMod + delta) * 100) / 100;
  const d = document.getElementById('er-mod-display');
  if (d) d.textContent = fmtMod(editRewardMod);
  updateRewardPreview();
}
function updateRewardPreview() {
  const prev    = document.getElementById('er-pts-preview');
  const equivEl = document.getElementById('er-pedidos-equiv');
  if (!prev) return;
  const r = REWARDS.find(x => x.id === editRewardId);
  const custo = r ? r.custo : 0;
  prev.innerHTML = custo > 0 ? calcPreviewHtml(custo, editRewardMod) : '—';
  if (equivEl && custo > 0) {
    const ptsVal = Math.round(custo * (globalMult + editRewardMod));
    const n = Math.ceil(ptsVal / 300);
    equivEl.innerHTML = `${icon('clock',12)} Equivale a <strong>${n} pedido${n !== 1 ? 's' : ''}</strong> de R$ 3.000 aprovados`;
  }
}
function saveEditReward(id) {
  const r = REWARDS.find(x => x.id === id);
  if (!r) return;
  r.name    = document.getElementById('er-nome')?.value?.trim()  || r.name;
  r.stock   = parseInt(document.getElementById('er-stock')?.value)   || r.stock;
  r.desc    = document.getElementById('er-desc')?.value?.trim()  || r.desc;
  r.itemMod = editRewardMod;
  r.img     = editRewardPhoto;
  r.imgPos  = { ...editRewardPhotoPos };
  editRewardId = null;
  renderMain();
}

function handleEditPhotoUpload(e) {

  if (!file) return;

  reader.onload = ev => {
    editRewardPhoto    = ev.target.result;
    editRewardPhotoPos = { x: 50, y: 50 };
    renderMain();

}
function removeEditPhoto() {
  editRewardPhoto    = null;
  editRewardPhotoPos = { x: 50, y: 50 };
  renderMain();
}
function startEditPhotoDrag(e) {
  e.preventDefault();
  const frame = document.getElementById('er-photo-frame');
  if (!frame) return;
  _editPhotoDrag = { startX: e.clientX, startY: e.clientY, startPX: editRewardPhotoPos.x, startPY: editRewardPhotoPos.y };
  frame.style.cursor = 'grabbing';
  document.addEventListener('mousemove', moveEditPhotoDrag);
  document.addEventListener('mouseup', endEditPhotoDrag);
}
function moveEditPhotoDrag(e) {
  if (!_editPhotoDrag) return;
  const frame = document.getElementById('er-photo-frame');

  const dx = (e.clientX - _editPhotoDrag.startX) / 2;

  editRewardPhotoPos.y = Math.min(100, Math.max(0, _editPhotoDrag.startPY - dy));
  frame.style.backgroundPosition = `${editRewardPhotoPos.x}% ${editRewardPhotoPos.y}%`;
}
function endEditPhotoDrag() {
  _editPhotoDrag = null;
  const frame = document.getElementById('er-photo-frame');
  if (frame) frame.style.cursor = 'grab';
  document.removeEventListener('mousemove', moveEditPhotoDrag);
  document.removeEventListener('mouseup', endEditPhotoDrag);
}

/* ============================================================
   LOJINHA — ADICIONAR ITEM
   ============================================================ */
function openAddItem() {
  addItemMod              = 0;
  addItemCatalogSelected  = false;
  addItemVenda            = 0;
  addItemSearch           = '';
  addItemPhoto            = null;
  addItemPhotoPos         = { x: 50, y: 50 };
  addItemOpen             = true;
  renderMain();
}
function closeAddItem() { addItemOpen = false; renderMain(); }
function clearAddSelection() {
  addItemCatalogSelected = false;
  addItemVenda = 0;
  const custoEl  = document.getElementById('ai-custo');
  const vendaRow = document.getElementById('ai-venda-row');
  if (custoEl)  { custoEl.type = 'number'; custoEl.removeAttribute('readonly'); custoEl.style.background = ''; custoEl.style.color = ''; custoEl.value = ''; delete custoEl.dataset.rawValue; }
  if (vendaRow) vendaRow.style.display = 'none';
  updateAddPreview();
}
function filterAddCatalog(val) {
  addItemSearch = val;
  if (addItemCatalogSelected) clearAddSelection();
  const dropdown = document.getElementById('ai-ac-dropdown');
  if (!dropdown) return;
  if (!val.trim()) { dropdown.style.display = 'none'; return; }
  const q = val.toLowerCase();
  const matches = CATALOG.filter(p =>
    p.name.toLowerCase().includes(q) || p.code.toLowerCase().includes(q)
  ).slice(0, 6);
  if (!matches.length) { dropdown.style.display = 'none'; return; }
  dropdown.innerHTML = matches.map(p => `
    <div class="autocomplete-item" onmousedown="selectAddProduct('${p.id}')">
      <span class="ac-emoji" style="color:var(--muted)">${icon(p.icon, 15)}</span>
      <div class="ac-body">
        <span class="ac-name">${p.name}</span>
        <span class="ac-meta">
          <span>${p.brand} · ${p.code}</span>
          <span>·</span>
          <span>Custo <strong>R$ ${p.cost.toLocaleString('pt-BR',{minimumFractionDigits:2})}</strong></span>
          <span>·</span>
          <span>Venda R$ ${p.price.toLocaleString('pt-BR',{minimumFractionDigits:2})}</span>
        </span>
      </div>
    </div>`).join('');
  dropdown.style.display = 'block';
}
function selectAddProduct(id) {
  const p = CATALOG.find(x => x.id === id);
  if (!p) return;
  const searchEl  = document.getElementById('ai-search');
  const custoEl   = document.getElementById('ai-custo');
  const vendaDisp = document.getElementById('ai-venda-display');
  const vendaRow  = document.getElementById('ai-venda-row');
  const dropdown  = document.getElementById('ai-ac-dropdown');
  if (searchEl)  searchEl.value = p.name;
  if (custoEl)   { custoEl.type = 'text'; custoEl.value = `R$ ${p.cost.toLocaleString('pt-BR',{minimumFractionDigits:2})}`; custoEl.dataset.rawValue = p.cost; custoEl.setAttribute('readonly', ''); custoEl.style.background = 'var(--paper-deep)'; custoEl.style.color = 'var(--muted)'; }
  if (vendaDisp) vendaDisp.textContent = `R$ ${p.price.toLocaleString('pt-BR',{minimumFractionDigits:2})}`;
  if (vendaRow)  vendaRow.style.display = 'block';
  if (dropdown)  dropdown.style.display = 'none';
  addItemCatalogSelected = true;
  addItemVenda           = p.price;
  addItemSearch          = p.name;

}
function handlePhotoUpload(e) {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = ev => {
    addItemPhoto    = ev.target.result;

  };
