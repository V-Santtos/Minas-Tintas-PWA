}
function removeAddPhoto() {
  addItemPhoto    = null;
  addItemPhotoPos = { x: 50, y: 50 };
  renderMain();
}
function startPhotoDrag(e) {
  e.preventDefault();
  const frame = document.getElementById('ai-photo-frame');
  if (!frame) return;
  _photoDrag = { startX: e.clientX, startY: e.clientY, startPX: addItemPhotoPos.x, startPY: addItemPhotoPos.y };
  frame.style.cursor = 'grabbing';
  document.addEventListener('mousemove', movePhotoDrag);
  document.addEventListener('mouseup', endPhotoDrag);
}
function movePhotoDrag(e) {
  if (!_photoDrag) return;
  const frame = document.getElementById('ai-photo-frame');
  if (!frame) return;
  const dx = (e.clientX - _photoDrag.startX) / 2;
  const dy = (e.clientY - _photoDrag.startY) / 2;
  addItemPhotoPos.x = Math.min(100, Math.max(0, _photoDrag.startPX - dx));
  addItemPhotoPos.y = Math.min(100, Math.max(0, _photoDrag.startPY - dy));
  frame.style.backgroundPosition = `${addItemPhotoPos.x}% ${addItemPhotoPos.y}%`;
}
function endPhotoDrag() {
  _photoDrag = null;
  const frame = document.getElementById('ai-photo-frame');
  if (frame) frame.style.cursor = 'grab';
  document.removeEventListener('mousemove', movePhotoDrag);
  document.removeEventListener('mouseup', endPhotoDrag);
}
function stepAddMod(delta) {
  addItemMod = Math.round((addItemMod + delta) * 100) / 100;
  const d = document.getElementById('ai-mod-display');
  if (d) d.textContent = fmtMod(addItemMod);
  updateAddPreview();
}
function updateAddPreview() {
  const custoEl  = document.getElementById('ai-custo');
  const prev     = document.getElementById('ai-pts-preview');
  const equivEl  = document.getElementById('ai-pedidos-equiv');
  if (!custoEl || !prev) return;
  const custo = parseFloat(custoEl.dataset.rawValue ?? custoEl.value) || 0;
  if (custo > 0) {
    prev.innerHTML = calcPreviewHtml(custo, addItemMod);
    if (equivEl) {
      const ptsVal = Math.round(custo * (globalMult + addItemMod));
      const n = Math.ceil(ptsVal / 300);
      equivEl.innerHTML = `${icon('clock',12)} Equivale a <strong>${n} pedido${n !== 1 ? 's' : ''}</strong> de R$ 3.000 aprovados`;
    }
  } else {
    prev.innerHTML = '—';
    if (equivEl) equivEl.innerHTML = '';
  }
}
function submitAddItem() {
  const nomeEl  = document.getElementById('ai-search');
  const custoEl = document.getElementById('ai-custo');
  const nome  = nomeEl?.value?.trim()  || '';
  const custo = parseFloat(custoEl?.dataset?.rawValue ?? custoEl?.value) || 0;
  if (!nome)  { nomeEl?.classList.add('form-error');  return; }
  if (!custo) { custoEl?.classList.add('form-error'); return; }
  REWARDS.push({
    id:      'item_' + Date.now(),
    name:    nome,
    custo,
    itemMod: addItemMod,
    stock:   parseInt(document.getElementById('ai-stock')?.value) || 0,
    desc:    document.getElementById('ai-desc')?.value?.trim() || '',
    icon:    'package',
    img:     addItemPhoto || null,
    imgPos:  { ...addItemPhotoPos },
  });
  addItemOpen = false;
  renderMain();
}

/* ============================================================
   RELATÓRIOS — NAVEGAÇÃO TEMPORAL
   ============================================================ */
const MONTH_SHORT = ['jan','fev','mar','abr','mai','jun','jul','ago','set','out','nov','dez'];
const MONTH_FULL  = ['Janeiro','Fevereiro','Março','Abril','Maio','Junho','Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'];
function toggleReportView(v) { reportView = v; renderMain(); }
function prevReportPeriod() {
  if (reportView === 'mes') { reportMonth--; if (reportMonth < 0) { reportMonth = 11; reportYear--; } }
  else reportYear--;
  renderMain();
}
function nextReportPeriod() {
  if (reportView === 'mes') { reportMonth++; if (reportMonth > 11) { reportMonth = 0; reportYear++; } }
  else reportYear++;
  renderMain();
}

/* ============================================================
   SCREEN: RELATÓRIOS
   ============================================================ */
function renderRelatorios() {
  // ── Filter by period ─────────────────────────────────────────
  const periodOrders = reportView === 'mes'
    ? ORDERS.filter(o => o.date.split(' ')[1] === MONTH_SHORT[reportMonth])
    : ORDERS;

  const approved    = periodOrders.filter(o => o.status === 'aprovado');
  const totalVol    = approved.reduce((s, o) => s + o.total, 0);
  const totalBonus  = approved.reduce((s, o) => s + Math.round(o.total * 0.10), 0);
  const ticketMedio = approved.length > 0 ? totalVol / approved.length : 0;

  const sc = {
    aprovado:  periodOrders.filter(o => o.status === 'aprovado').length,
    pendente:  periodOrders.filter(o => o.status === 'pendente').length,
    recusado:  periodOrders.filter(o => o.status === 'recusado').length,
    estornado: periodOrders.filter(o => o.status === 'estornado').length,
  };
  const sTotal = periodOrders.length;

  // ── Ranking ───────────────────────────────────────────────────
  const ps = {};
  PAINTERS.forEach(p => { ps[p.name] = { volume:0, bonus:0, orders:0, city:p.city }; });
  approved.forEach(o => {
    if (!ps[o.painter]) ps[o.painter] = { volume:0, bonus:0, orders:0, city:'' };
    ps[o.painter].volume += o.total;
    ps[o.painter].bonus  += Math.round(o.total * 0.10);
    ps[o.painter].orders++;
  });
  const ranking = PAINTERS
    .map(p => ({ name:p.name, city:p.city, ...(ps[p.name] || { volume:0, bonus:0, orders:0 }) }))
    .sort((a, b) => b.volume - a.volume);
  const maxVol = ranking[0]?.volume || 1;
  const top    = ranking[0];

  // ── Chart data ────────────────────────────────────────────────
  let volData, bonusData;
  if (reportView === 'mes') {
    const wv = [0,0,0,0], wb = [0,0,0,0];
    approved.forEach(o => {
      const day = parseInt(o.date.split(' ')[0]);
      const wi = day <= 7 ? 0 : day <= 14 ? 1 : day <= 21 ? 2 : 3;
      wv[wi] += o.total;
      wb[wi] += Math.round(o.total * 0.10);
    });
    volData   = ['Sem 1','Sem 2','Sem 3','Sem 4'].map((label,i) => ({ label, v: Math.round(wv[i]) }));
    bonusData = ['Sem 1','Sem 2','Sem 3','Sem 4'].map((label,i) => ({ label, v: Math.round(wb[i]) }));
  } else {
    const presentMonths = [...new Set(ORDERS.map(o => o.date.split(' ')[1]))];
    const sortedMonths  = MONTH_SHORT.filter(m => presentMonths.includes(m));
    volData   = sortedMonths.map(m => ({
      label: MONTH_FULL[MONTH_SHORT.indexOf(m)].slice(0,3),
      v: Math.round(approved.filter(o => o.date.split(' ')[1] === m).reduce((s,o) => s + o.total, 0))
    }));
    bonusData = sortedMonths.map(m => ({
      label: MONTH_FULL[MONTH_SHORT.indexOf(m)].slice(0,3),
      v: approved.filter(o => o.date.split(' ')[1] === m).reduce((s,o) => s + Math.round(o.total * 0.10), 0)
    }));
  }

  const periodLabel   = reportView === 'mes' ? `${MONTH_FULL[reportMonth]} ${reportYear}` : String(reportYear);
  const chartGranLabel = reportView === 'mes' ? 'por semana' : 'por mês';
  const topLabel       = reportView === 'mes' ? 'Pintor do Mês' : 'Pintor do Ano';

  const donutSegs = [
    { label:'Aprovado',  v:sc.aprovado,  color:'#4F7A4A' },
    { label:'Pendente',  v:sc.pendente,  color:'#B5751F' },
    { label:'Recusado',  v:sc.recusado,  color:'#CC0000' },
    { label:'Estornado', v:sc.estornado, color:'#8A817A' },
  ];
  const barColors = ['#4F7A4A','#6B46C1','#B5751F','var(--muted)','var(--muted)','var(--muted)'];
  const fmtVol    = v => v >= 10000 ? `R$ ${(v/1000).toFixed(0)}k` : `R$ ${(v/1000).toFixed(1)}k`;
  const fmtBonus  = v => v >= 1000  ? `${(v/1000).toFixed(1)}k pts` : `${v} pts`;

  // ── SVG helpers ───────────────────────────────────────────────
  function lineChartSVG(data, id, color, fmt) {
    if (!data.length) return `<div style="height:120px;display:flex;align-items:center;justify-content:center;color:var(--muted);font-size:12px">Sem dados no período</div>`;
    const W=440, H=150, pl=10, pr=10, pt=26, pb=24;
    const iW=W-pl-pr, iH=H-pt-pb;
    const maxV = Math.max(...data.map(d => d.v), 1);
    const xs = data.length === 1
      ? [pl + iW/2]
      : data.map((_,i) => pl + (i / (data.length - 1)) * iW);
    const ys = data.map(d => pt + iH - (d.v / maxV) * iH);
    let lp = `M ${xs[0].toFixed(1)},${ys[0].toFixed(1)}`;
    for (let i = 0; i < data.length - 1; i++) {
      const mx = ((xs[i] + xs[i+1]) / 2).toFixed(1);
      lp += ` C ${mx},${ys[i].toFixed(1)} ${mx},${ys[i+1].toFixed(1)} ${xs[i+1].toFixed(1)},${ys[i+1].toFixed(1)}`;
    }
    const ap = data.length === 1
      ? `${lp} L${xs[0].toFixed(1)},${(pt+iH).toFixed(1)} Z`
      : `${lp} L${xs[xs.length-1].toFixed(1)},${(pt+iH).toFixed(1)} L${xs[0].toFixed(1)},${(pt+iH).toFixed(1)} Z`;
    return `<svg viewBox="0 0 ${W} ${H}" width="100%" style="display:block;overflow:visible">
      <defs><linearGradient id="lg-${id}" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0%" stop-color="${color}" stop-opacity=".18"/>
        <stop offset="100%" stop-color="${color}" stop-opacity=".01"/>
      </linearGradient></defs>
      ${[.25,.5,.75,1].map(t => `<line x1="${pl}" y1="${(pt+iH*t).toFixed(1)}" x2="${(pl+iW).toFixed(1)}" y2="${(pt+iH*t).toFixed(1)}" stroke="var(--line)" stroke-width="1"/>`).join('')}
      <path d="${ap}" fill="url(#lg-${id})"/>
      <path d="${lp}" fill="none" stroke="${color}" stroke-width="2.5" stroke-linejoin="round" stroke-linecap="round"/>
      ${data.map((d,i) => `
        <circle cx="${xs[i].toFixed(1)}" cy="${ys[i].toFixed(1)}" r="4.5" fill="${color}" stroke="var(--card)" stroke-width="2.5"/>
        ${d.v > 0 ? `<text x="${xs[i].toFixed(1)}" y="${(ys[i]-10).toFixed(1)}" text-anchor="middle" font-family="'Plus Jakarta Sans',sans-serif" font-size="10" font-weight="800" letter-spacing="-.02em" fill="${color}">${fmt(d.v)}</text>` : ''}
        <text x="${xs[i].toFixed(1)}" y="${H-5}" text-anchor="middle" font-family="Inter,sans-serif" font-size="10.5" fill="var(--muted)">${d.label}</text>
      `).join('')}
    </svg>`;
  }

  function donutSVG(segs) {
    const r=54, ri=34, cx=70, cy=70, W=140, H=140;
    const tot = segs.reduce((s,g) => s + g.v, 0);
    const total = tot || 1;
    let a = -Math.PI / 2;
    const paths = segs.filter(g => g.v > 0).map(g => {
      const sw = (g.v / total) * 2 * Math.PI, e = a + sw, lg = sw > Math.PI ? 1 : 0;
      const p = `M ${(cx+r*Math.cos(a)).toFixed(2)},${(cy+r*Math.sin(a)).toFixed(2)} A ${r} ${r} 0 ${lg} 1 ${(cx+r*Math.cos(e)).toFixed(2)},${(cy+r*Math.sin(e)).toFixed(2)} L ${(cx+ri*Math.cos(e)).toFixed(2)},${(cy+ri*Math.sin(e)).toFixed(2)} A ${ri} ${ri} 0 ${lg} 0 ${(cx+ri*Math.cos(a)).toFixed(2)},${(cy+ri*Math.sin(a)).toFixed(2)} Z`;
      a = e;
      return `<path d="${p}" fill="${g.color}"/>`;
    });
    if (!tot) paths.push(`<circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="var(--line)" stroke-width="${r-ri}"/>`);
    return `<svg viewBox="0 0 ${W} ${H}" width="${W}" height="${H}">
      ${paths.join('')}
      <text x="${cx}" y="${cy-2}" text-anchor="middle" font-family="'Plus Jakarta Sans',sans-serif" font-size="22" font-weight="800" fill="var(--ink)">${tot}</text>
      <text x="${cx}" y="${cy+14}" text-anchor="middle" font-family="Inter,sans-serif" font-size="9.5" fill="var(--muted)">pedidos</text>
    </svg>`;
  }

  function rankIcon(i) {
    if (i === 0) return `<i data-lucide="trophy" style="width:15px;height:15px;color:#C9A227;flex-shrink:0"></i>`;
    if (i === 1) return `<i data-lucide="award"  style="width:15px;height:15px;color:#9AA5B1;flex-shrink:0"></i>`;
    if (i === 2) return `<i data-lucide="award"  style="width:15px;height:15px;color:#9C6B3A;flex-shrink:0"></i>`;
    return `<span style="width:15px;height:15px;display:inline-flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;color:var(--muted);flex-shrink:0">${i+1}</span>`;
  }

  // ── HTML ──────────────────────────────────────────────────────
  return `
  <div class="page-header">
    <div>
      <div class="eyebrow">LOJA · CENTRO · SÃO JOÃO DEL-REI</div>
      <h1 class="page-title">Relatórios</h1>
    </div>
    <div class="page-actions" style="align-items:center">
      <div style="display:flex;background:var(--paper-deep);border-radius:8px;padding:3px;gap:2px">
        <button onclick="toggleReportView('mes')" style="padding:5px 18px;border-radius:6px;border:none;font-family:var(--font-body);font-size:12.5px;font-weight:600;cursor:pointer;transition:all .15s;${reportView==='mes'?'background:var(--card);color:var(--ink);box-shadow:0 1px 4px rgba(0,0,0,.10)':'background:transparent;color:var(--muted)'}">Mês</button>
        <button onclick="toggleReportView('ano')" style="padding:5px 18px;border-radius:6px;border:none;font-family:var(--font-body);font-size:12.5px;font-weight:600;cursor:pointer;transition:all .15s;${reportView==='ano'?'background:var(--card);color:var(--ink);box-shadow:0 1px 4px rgba(0,0,0,.10)':'background:transparent;color:var(--muted)'}">Ano</button>
      </div>
      <div style="display:flex;align-items:center;gap:2px">
        <button class="btn btn-ghost btn-sm" onclick="prevReportPeriod()" style="width:28px;height:28px;padding:0;display:flex;align-items:center;justify-content:center">${icon('chevron-left',14)}</button>
        <span style="font-size:13.5px;font-weight:700;color:var(--ink);min-width:100px;text-align:center;letter-spacing:-.02em">${periodLabel}</span>
        <button class="btn btn-ghost btn-sm" onclick="nextReportPeriod()" style="width:28px;height:28px;padding:0;display:flex;align-items:center;justify-content:center">${icon('chevron-right',14)}</button>
      </div>
      <button class="btn btn-ghost" onclick="window.print()" style="margin-left:12px">${icon('printer')} Imprimir</button>
    </div>
  </div>

  <div class="stat-grid">
    <div class="stat-tile">
      <span class="stat-label">Pedidos gerados</span>
      <span class="stat-value">${sTotal}</span>
      <span class="stat-foot">${sc.aprovado} aprovados · ${sc.pendente} pendentes</span>
    </div>
    <div class="stat-tile t-success">
      <span class="stat-label">Volume aprovado</span>
      <span class="stat-value" style="font-size:24px">R$ ${(totalVol/1000).toFixed(1)}k</span>
      <span class="stat-foot">em ${approved.length} pedidos</span>
    </div>
    <div class="stat-tile t-purple">
      <span class="stat-label">Bônus distribuídos</span>
      <span class="stat-value" style="font-size:22px">${totalBonus.toLocaleString('pt-BR')} pts</span>
      <span class="stat-foot">via programa de fidelidade</span>
    </div>
    <div class="stat-tile">
      <span class="stat-label">Ticket médio</span>
      <span class="stat-value" style="font-size:24px">${ticketMedio > 0 ? `R$ ${(ticketMedio/1000).toFixed(1)}k` : '—'}</span>
      <span class="stat-foot">${approved.length > 0 ? 'por pedido aprovado' : 'sem pedidos aprovados'}</span>
    </div>
  </div>

  <div style="display:grid;grid-template-columns:1fr 1fr;gap:14px;padding:0 32px 14px">

    <div class="stat-tile" style="gap:0;padding:20px 20px 12px">
      <div style="display:flex;align-items:baseline;justify-content:space-between;margin-bottom:14px">
        <span class="stat-label">Volume aprovado ${chartGranLabel}</span>
        <span style="font-size:11px;color:var(--muted)">${periodLabel}</span>
      </div>
      ${lineChartSVG(volData, 'vol', '#4F7A4A', fmtVol)}
    </div>

    <div style="display:flex;flex-direction:column;gap:14px">

      <div class="stat-tile" style="gap:0;padding:20px">
        <span class="stat-label" style="margin-bottom:12px;display:block">Status dos pedidos</span>
        <div style="display:flex;align-items:center;gap:14px">
          ${donutSVG(donutSegs)}
          <div style="display:flex;flex-direction:column;gap:8px;flex:1">
            ${donutSegs.map(s => `
              <div style="display:flex;align-items:center;gap:6px">
                <span style="width:7px;height:7px;border-radius:50%;background:${s.color};flex-shrink:0"></span>
                <span style="font-size:12px;color:var(--ink-2);flex:1">${s.label}</span>
                <span style="font-size:12px;font-weight:700;color:var(--ink)">${s.v}</span>
                <span style="font-size:11px;color:var(--muted);min-width:26px;text-align:right">${Math.round(s.v/(sTotal||1)*100)}%</span>
              </div>
            `).join('')}
          </div>
        </div>
      </div>

      <div style="background:#1C1A17;border-radius:14px;padding:18px 20px;display:flex;align-items:center;gap:14px;flex:1">
        <div style="position:relative;flex-shrink:0">
          <div style="width:50px;height:50px;border-radius:50%;background:rgba(201,162,39,.15);border:2px solid #C9A227;display:flex;align-items:center;justify-content:center;font-family:var(--font-display);font-weight:800;font-size:16px;color:#fff">${initials(top.name)}</div>
          <div style="position:absolute;bottom:-2px;right:-4px;width:18px;height:18px;background:#C9A227;border-radius:50%;display:flex;align-items:center;justify-content:center">
            <i data-lucide="star" style="width:10px;height:10px;color:#1C1A17"></i>
          </div>
        </div>
        <div style="flex:1;min-width:0">
          <div style="font-size:9.5px;font-weight:600;letter-spacing:.14em;text-transform:uppercase;color:rgba(255,255,255,.35);margin-bottom:2px">${topLabel}</div>
          <div style="font-family:var(--font-display);font-weight:800;font-size:15px;color:#fff;letter-spacing:-.02em;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${top.name}</div>
          <div style="font-size:11px;color:rgba(255,255,255,.4);margin-top:1px">${top.city}</div>
        </div>
        <div style="text-align:right;flex-shrink:0">
          <div style="font-family:var(--font-display);font-weight:800;font-size:16px;color:#C9A227;letter-spacing:-.02em">R$ ${(top.volume/1000).toFixed(1)}k</div>
          <div style="font-size:11px;color:rgba(255,255,255,.35);margin-top:3px">${top.bonus.toLocaleString('pt-BR')} pts</div>
        </div>
      </div>

    </div>
  </div>

  <div style="display:grid;grid-template-columns:1fr 1fr;gap:14px;padding:0 32px 32px">

    <div class="stat-tile" style="gap:0;padding:20px 20px 12px">
      <div style="display:flex;align-items:baseline;justify-content:space-between;margin-bottom:14px">
        <span class="stat-label">Bônus distribuídos ${chartGranLabel}</span>
        <span style="font-size:11px;color:var(--muted)">${periodLabel}</span>
      </div>
      ${lineChartSVG(bonusData, 'bonus', '#6B46C1', fmtBonus)}
    </div>

    <div class="stat-tile" style="gap:0;padding:20px">
      <span class="stat-label" style="margin-bottom:14px;display:block">Ranking de pintores</span>
      <div style="display:flex;flex-direction:column;gap:12px">
        ${ranking.map((p, i) => {
          const pct = Math.round((p.volume / maxVol) * 100);
          return `<div>
            <div style="display:flex;align-items:center;gap:7px;margin-bottom:5px">
              ${rankIcon(i)}
              <span style="flex:1;font-size:12.5px;font-weight:600;color:var(--ink);white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${p.name}</span>
              <span style="font-size:11.5px;font-weight:700;color:var(--ink);font-variant-numeric:tabular-nums;flex-shrink:0">R$ ${(p.volume/1000).toFixed(1)}k</span>
            </div>
            <div style="height:4px;background:var(--paper-deep);border-radius:999px;overflow:hidden">
              <div style="height:100%;width:${pct}%;background:${barColors[i]||'var(--muted)'};border-radius:999px"></div>
            </div>
          </div>`;
        }).join('')}
      </div>
    </div>

  </div>
  `;
}

/* ============================================================
   INIT
   ============================================================ */
document.addEventListener('DOMContentLoaded', function() {
  render();

  /* Sidebar hover events são anexados dinamicamente em doAdminLogin()
     pois o sidebar só existe após o login. */

  /* Close filter panel when clicking outside */
  document.addEventListener('click', (e) => {
    if (filtersOpen && !e.target.closest('.filters-panel') && !e.target.closest('.filters-btn')) {
      filtersOpen = false;
      renderMain();
    }
  });
});
</script>
</body>
</html>
