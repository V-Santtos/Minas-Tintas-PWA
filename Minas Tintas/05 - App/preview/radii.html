<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<title>Radii</title>
<link rel="stylesheet" href="_card.css">
<style>
  .grid { display: grid; grid-template-columns: repeat(6, 1fr); gap: 14px; }
  .item { display: flex; flex-direction: column; align-items: center; gap: 10px; }
  .box {
    width: 96px;
    height: 96px;
    background: var(--card);
    border: 1px solid var(--line-strong);
  }
  .name { font-size: 12px; font-weight: 600; color: var(--ink); }
  .val { font-family: var(--font-mono); font-size: 11px; color: var(--muted); }
</style>
</head>
<body>
  <div class="grid">
    <div class="item"><div class="box" style="border-radius:8px"></div><div class="name">--r-sm</div><div class="val">8 px</div></div>
    <div class="item"><div class="box" style="border-radius:12px"></div><div class="name">--r-md</div><div class="val">12 px</div></div>
    <div class="item"><div class="box" style="border-radius:16px"></div><div class="name">--r-lg</div><div class="val">16 px</div></div>
    <div class="item"><div class="box" style="border-radius:20px"></div><div class="name">--r-xl</div><div class="val">20 px</div></div>
    <div class="item"><div class="box" style="border-radius:24px"></div><div class="name">--r-2xl</div><div class="val">24 px</div></div>
    <div class="item"><div class="box" style="border-radius:999px"></div><div class="name">--r-pill</div><div class="val">pills only</div></div>
  </div>
</body>
</html>
