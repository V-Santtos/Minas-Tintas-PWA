<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<title>Card patterns</title>
<link rel="stylesheet" href="_card.css">
<script src="https://unpkg.com/lucide@0.460.0/dist/umd/lucide.min.js"></script>
<style>
  body { padding: 24px; }
  .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 18px; }
  .card {
    background: var(--card);
    border: 1px solid var(--line);
    border-radius: 16px;
    padding: 18px 20px;
    box-shadow: 0 1px 2px rgba(28,26,23,0.04);
    display: flex;
    flex-direction: column;
    gap: 8px;
  }
  .eyebrow { font-size: 10px; font-weight: 600; letter-spacing: 0.16em; text-transform: uppercase; color: var(--muted); }
  .title { font-family: var(--font-display); font-weight: 700; font-size: 22px; letter-spacing: -0.02em; line-height: 1.1; color: var(--ink); }
  .meta { font-size: 13px; color: var(--muted); display: flex; gap: 8px; align-items: center; }
  .meta .sep { width: 3px; height: 3px; border-radius: 50%; background: var(--muted); }
  .num { font-family: var(--font-display); font-weight: 700; font-size: 42px; line-height: 1; letter-spacing: -0.02em; color: var(--ink); font-variant-numeric: tabular-nums; }
  .num small { font-family: var(--font-body); font-weight: 500; font-size: 14px; color: var(--muted); margin-left: 4px; }
  .pill { display: inline-flex; align-items: center; gap: 6px; padding: 5px 10px; border-radius: 999px; font-size: 11px; font-weight: 600; background: #E8EFE3; color: #4F7A4A; align-self: flex-start; }
  .pill .dot { width: 5px; height: 5px; border-radius: 50%; background: #4F7A4A; }
  .product {
    display: grid;
    grid-template-columns: 64px 1fr auto;
    gap: 14px;
    align-items: center;
  }
  .thumb {
    width: 64px; height: 64px;
    background: var(--paper-deep);
    border: 1px solid var(--line);
    border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    color: var(--muted);
  }
  .thumb i { width: 22px; height: 22px; }
  .prod-name { font-weight: 600; font-size: 14px; color: var(--ink); }
  .prod-sub { font-size: 12px; color: var(--muted); margin-top: 2px; }
  .price { font-family: var(--font-body); font-weight: 700; font-size: 15px; color: var(--ink); font-variant-numeric: tabular-nums; }
</style>
</head>
<body>
  <div class="grid">
    <div class="card">
      <div class="eyebrow">PEDIDO #0481</div>
      <div class="title">Obra Vila Esperança</div>
      <div class="meta"><span>12 mar 2026</span><span class="sep"></span><span>3 itens</span></div>
      <span class="pill"><span class="dot"></span>bônus liberado</span>
    </div>
    <div class="card">
      <div class="eyebrow">SALDO ATUAL</div>
      <div class="num">12.480<small>pts</small></div>
      <div class="meta">+ 184 pts em 24 h</div>
    </div>
    <div class="card" style="grid-column: span 2;">
      <div class="product">
        <div class="thumb"><i data-lucide="paint-roller"></i></div>
        <div>
          <div class="prod-name">Tinta látex acrílica fosca — branco neve · 18L</div>
          <div class="prod-sub">Suvinil · cobertura ~14m²/L</div>
        </div>
        <div class="price">R$ 320,00</div>
      </div>
    </div>
  </div>
  <script>lucide.createIcons();</script>
</body>
</html>
