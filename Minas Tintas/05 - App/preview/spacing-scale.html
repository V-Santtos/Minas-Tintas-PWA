<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<title>Spacing</title>
<link rel="stylesheet" href="_card.css">
<style>
  .stack { display: flex; flex-direction: column; gap: 8px; }
  .row {
    display: grid;
    grid-template-columns: 100px 1fr 80px;
    align-items: center;
    gap: 16px;
    padding: 6px 0;
  }
  .label { font-family: var(--font-mono); font-size: 11px; color: var(--ink); font-weight: 600; }
  .bar { height: 14px; background: var(--brand); border-radius: 4px; }
  .px { font-family: var(--font-mono); font-size: 11px; color: var(--muted); text-align: right; }
</style>
</head>
<body>
  <div class="stack">
    <div class="row"><div class="label">--s-1</div><div class="bar" style="width:4px"></div><div class="px">4 px</div></div>
    <div class="row"><div class="label">--s-2</div><div class="bar" style="width:8px"></div><div class="px">8 px</div></div>
    <div class="row"><div class="label">--s-3</div><div class="bar" style="width:12px"></div><div class="px">12 px</div></div>
    <div class="row"><div class="label">--s-4</div><div class="bar" style="width:16px"></div><div class="px">16 px</div></div>
    <div class="row"><div class="label">--s-5</div><div class="bar" style="width:20px"></div><div class="px">20 px</div></div>
    <div class="row"><div class="label">--s-6</div><div class="bar" style="width:24px"></div><div class="px">24 px</div></div>
    <div class="row"><div class="label">--s-8</div><div class="bar" style="width:32px"></div><div class="px">32 px</div></div>
    <div class="row"><div class="label">--s-10</div><div class="bar" style="width:40px"></div><div class="px">40 px</div></div>
    <div class="row"><div class="label">--s-12</div><div class="bar" style="width:48px"></div><div class="px">48 px</div></div>
    <div class="row"><div class="label">--s-16</div><div class="bar" style="width:64px"></div><div class="px">64 px</div></div>
    <div class="row"><div class="label">--s-20</div><div class="bar" style="width:80px"></div><div class="px">80 px</div></div>
  </div>
</body>
</html>
