<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<title>Colors — Neutral surfaces</title>
<link rel="stylesheet" href="_card.css">
<style>
  .swatches { display: grid; grid-template-columns: repeat(5, 1fr); gap: 12px; }
  .sw {
    border-radius: 12px;
    border: 1px solid var(--line);
    overflow: hidden;
    background: var(--card);
  }
  .sw .chip { height: 96px; }
  .sw .meta { padding: 10px 12px 12px; }
  .sw .name { font-size: 13px; font-weight: 600; color: var(--ink); }
  .sw .hex  { font-family: var(--font-mono); font-size: 11px; color: var(--muted); margin-top: 2px; }
</style>
</head>
<body>
  <div class="swatches">
    <div class="sw">
      <div class="chip" style="background:#FAF7F2;"></div>
      <div class="meta"><div class="name">paper</div><div class="hex">#FAF7F2</div></div>
    </div>
    <div class="sw">
      <div class="chip" style="background:#F2EDE4;"></div>
      <div class="meta"><div class="name">paper-deep</div><div class="hex">#F2EDE4</div></div>
    </div>
    <div class="sw">
      <div class="chip" style="background:#FFFFFF;"></div>
      <div class="meta"><div class="name">card</div><div class="hex">#FFFFFF</div></div>
    </div>
    <div class="sw">
      <div class="chip" style="background:#E7E0D4;"></div>
      <div class="meta"><div class="name">line</div><div class="hex">#E7E0D4</div></div>
    </div>
    <div class="sw">
      <div class="chip" style="background:#D5CCBC;"></div>
      <div class="meta"><div class="name">line-strong</div><div class="hex">#D5CCBC</div></div>
    </div>
  </div>
</body>
</html>
